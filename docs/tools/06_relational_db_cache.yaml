---
# RETRO Pipeline Tools Documentation
# Category: Relational Database, Cache, Queue & Storage
# File: 06_relational_db_cache.yaml
# Purpose: Infrastruktur penyimpanan data untuk semua layer RETRO:
#          - PostgreSQL: persistent relational data (companies, proposals, audit logs)
#          - SQLite: development / lightweight deployment
#          - SQLModel: ORM yang type-safe untuk RETRO models
#          - Alembic: database migrations
#          - Redis: deduplication hash cache, job queue, rate limit counter
#          - RQ (Redis Queue): background job processing tanpa Celery overhead
#          - Valkey: Redis fork, drop-in replacement jika ingin fully open-source
#          - MinIO: object storage untuk PDF, HTML, gambar (S3-compatible)
#          - DVC: version control untuk datasets dan ML artifacts
#
# RECOMMENDED STACK (minimal viable RETRO):
#   Persistent DB:  PostgreSQL (production) / SQLite (development)
#   ORM:            SQLModel + Alembic
#   Cache + Dedup:  Redis (atau Valkey)
#   Job Queue:      RQ (Redis Queue)
#   Object Storage: MinIO (atau local filesystem untuk MVP)

tools:

  - id: postgresql
    name: "PostgreSQL"
    category: "Relational Database"
    description: >
      PostgreSQL adalah relational database open-source yang sangat powerful, battle-tested,
      dan feature-rich. Mendukung JSONB (JSON binary yang bisa di-query dan di-index),
      full-text search, row-level security, partitioning, dan pgvector extension (untuk
      vector similarity search). RETRO menggunakan PostgreSQL sebagai primary persistent
      storage untuk semua data: company staging, company profiles, proposal drafts,
      audit logs, dan pipeline state. Tersedia sebagai Docker image, cloud managed
      (Supabase free tier, Railway, Neon, ElephantSQL).
    specific_function: >
      Primary relational database RETRO. Menyimpan semua data pipeline secara persisten:
      raw_staging (hasil crawling), company_profiles (profile cards dari Context Agent),
      proposals (draft dan final), pipeline_runs (audit trail), dan dedup_hashes
      (jika tidak pakai Redis). Mendukung JSONB untuk profile_card yang flexible
      tanpa perlu migrasi schema setiap ada field baru.
    language: "Python (psycopg2, asyncpg, SQLModel, SQLAlchemy)"
    pricing: "Free (self-hosted), Supabase free tier 500MB, Neon free 512MB"
    last_updated: "2025"
    url: "https://www.postgresql.org"
    retro:
      phase: "Semua Phase (persistent storage)"
      role: >
        Backbone penyimpanan RETRO. Setiap komponen pipeline menulis dan membaca
        dari PostgreSQL. Crawler menulis raw_staging, Context Agent membaca dari
        raw_staging dan menulis ke company_profiles, Synthesis Agent membaca
        company_profiles dan menulis ke proposals, Email Agent membaca dari proposals.
      when_to_use: >
        Gunakan PostgreSQL untuk semua data yang perlu persisten melampaui satu
        pipeline run. Redis untuk cache sementara, PostgreSQL untuk data permanen.
        Selalu gunakan PostgreSQL di production. Untuk development, SQLite bisa
        digunakan sebagai substitute yang lebih ringan.
      priority: "primary"
      output_goes_to: "Semua komponen pipeline (read/write)"
    setup:
      install: "pip install psycopg2-binary asyncpg"
      docker: "docker run -e POSTGRES_USER=retro -e POSTGRES_PASSWORD=retro -e POSTGRES_DB=retro_db -p 5432:5432 -v pgdata:/var/lib/postgresql/data postgres:16"
      requirements:
        - "psycopg2-binary>=2.9.0 (sync) atau asyncpg>=0.29.0 (async)"
        - "PostgreSQL 14+ (untuk JSONB performance dan pgvector support)"
      env_vars:
        - name: DATABASE_URL
          description: "postgresql://retro:retro@localhost:5432/retro_db"
        - name: DATABASE_URL_ASYNC
          description: "postgresql+asyncpg://retro:retro@localhost:5432/retro_db"
    usage:
      basic_example: |
        import psycopg2
        import json

        conn = psycopg2.connect("postgresql://retro:retro@localhost/retro_db")
        cur  = conn.cursor()

        # Buat tabel staging
        cur.execute("""
            CREATE TABLE IF NOT EXISTS raw_staging (
                id          SERIAL PRIMARY KEY,
                url         TEXT UNIQUE NOT NULL,
                url_hash    TEXT UNIQUE NOT NULL,
                source      TEXT,
                content     TEXT,
                crawled_at  TIMESTAMPTZ DEFAULT NOW(),
                processed   BOOLEAN DEFAULT FALSE
            )
        """)
        conn.commit()

        # Insert dengan ON CONFLICT (idempotent)
        import hashlib
        url = "https://example.com/exhibitor/pt-maju"
        url_hash = hashlib.sha256(url.encode()).hexdigest()

        cur.execute("""
            INSERT INTO raw_staging (url, url_hash, source, content)
            VALUES (%s, %s, %s, %s)
            ON CONFLICT (url_hash) DO NOTHING
            RETURNING id
        """, (url, url_hash, "expo_crawler", "<html>..."))
        result = cur.fetchone()
        if result:
            print(f"Inserted: id={result[0]}")
        else:
            print("Already exists, skipped")
        conn.commit()

      retro_example: |
        import psycopg2
        import psycopg2.extras
        import hashlib
        import json
        import os
        from datetime import datetime, timezone

        DATABASE_URL = os.getenv("DATABASE_URL", "postgresql://retro:retro@localhost/retro_db")
        _conn = None

        def get_db():
            global _conn
            if _conn is None or _conn.closed:
                _conn = psycopg2.connect(DATABASE_URL)
                _conn.autocommit = False
                psycopg2.extras.register_default_jsonb(_conn)
                _init_schema(_conn)
            return _conn

        def _init_schema(conn):
            cur = conn.cursor()
            cur.execute("""
                CREATE TABLE IF NOT EXISTS raw_staging (
                    id          SERIAL PRIMARY KEY,
                    url         TEXT UNIQUE NOT NULL,
                    url_hash    CHAR(64) UNIQUE NOT NULL,
                    domain      TEXT,
                    source      TEXT,
                    content     TEXT,
                    metadata    JSONB DEFAULT '{}',
                    crawled_at  TIMESTAMPTZ DEFAULT NOW(),
                    processed   BOOLEAN DEFAULT FALSE
                );

                CREATE TABLE IF NOT EXISTS company_profiles (
                    id              SERIAL PRIMARY KEY,
                    domain          TEXT UNIQUE NOT NULL,
                    company_name    TEXT NOT NULL,
                    industry        TEXT,
                    country         TEXT,
                    expo            TEXT,
                    profile_card    JSONB NOT NULL,
                    profiled_at     TIMESTAMPTZ DEFAULT NOW(),
                    embedding_id    TEXT,
                    proposal_sent   BOOLEAN DEFAULT FALSE
                );

                CREATE TABLE IF NOT EXISTS proposals (
                    id              SERIAL PRIMARY KEY,
                    company_domain  TEXT REFERENCES company_profiles(domain),
                    expo            TEXT,
                    draft_html      TEXT,
                    final_pdf_path  TEXT,
                    status          TEXT DEFAULT 'draft',
                    created_at      TIMESTAMPTZ DEFAULT NOW(),
                    sent_at         TIMESTAMPTZ,
                    email_to        TEXT
                );

                CREATE TABLE IF NOT EXISTS pipeline_runs (
                    id          SERIAL PRIMARY KEY,
                    run_id      UUID DEFAULT gen_random_uuid(),
                    phase       TEXT,
                    status      TEXT,
                    details     JSONB DEFAULT '{}',
                    started_at  TIMESTAMPTZ DEFAULT NOW(),
                    ended_at    TIMESTAMPTZ
                );

                CREATE INDEX IF NOT EXISTS idx_raw_staging_processed ON raw_staging(processed);
                CREATE INDEX IF NOT EXISTS idx_company_profiles_expo  ON company_profiles(expo);
                CREATE INDEX IF NOT EXISTS idx_proposals_status       ON proposals(status);
            """)
            conn.commit()

        def upsert_raw_staging(url: str, source: str, content: str, metadata: dict = None) -> bool:
            """Return True jika inserted (baru), False jika sudah ada (duplikat)."""
            conn = get_db()
            cur  = conn.cursor()
            url_hash = hashlib.sha256(url.encode()).hexdigest()

            import tldextract
            ext    = tldextract.extract(url)
            domain = f"{ext.domain}.{ext.suffix}"

            cur.execute("""
                INSERT INTO raw_staging (url, url_hash, domain, source, content, metadata)
                VALUES (%s, %s, %s, %s, %s, %s)
                ON CONFLICT (url_hash) DO NOTHING
                RETURNING id
            """, (url, url_hash, domain, source, content, json.dumps(metadata or {})))

            result = cur.fetchone()
            conn.commit()
            return result is not None  # True = baru, False = duplikat

        def get_unprocessed_staging(limit: int = 50) -> list[dict]:
            conn = get_db()
            cur  = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
            cur.execute("""
                SELECT id, url, domain, source, content, metadata
                FROM raw_staging
                WHERE processed = FALSE
                ORDER BY crawled_at ASC
                LIMIT %s
            """, (limit,))
            return [dict(r) for r in cur.fetchall()]

        def mark_staged_processed(staging_ids: list[int]):
            conn = get_db()
            cur  = conn.cursor()
            cur.execute(
                "UPDATE raw_staging SET processed = TRUE WHERE id = ANY(%s)",
                (staging_ids,)
            )
            conn.commit()

        def upsert_company_profile(profile_card: dict, expo: str, embedding_id: str = None):
            conn = get_db()
            cur  = conn.cursor()
            cur.execute("""
                INSERT INTO company_profiles
                    (domain, company_name, industry, country, expo, profile_card, embedding_id)
                VALUES (%s, %s, %s, %s, %s, %s, %s)
                ON CONFLICT (domain) DO UPDATE SET
                    profile_card = EXCLUDED.profile_card,
                    profiled_at  = NOW(),
                    expo         = EXCLUDED.expo,
                    embedding_id = COALESCE(EXCLUDED.embedding_id, company_profiles.embedding_id)
            """, (
                profile_card["domain"],
                profile_card["company_name"],
                profile_card.get("industry"),
                profile_card.get("country"),
                expo,
                json.dumps(profile_card),
                embedding_id,
            ))
            conn.commit()

        def get_top_candidates(expo: str, limit: int = 20) -> list[dict]:
            """Ambil company profiles yang belum dikirim proposal, diurut by profiled_at."""
            conn = get_db()
            cur  = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)
            cur.execute("""
                SELECT domain, company_name, industry, profile_card
                FROM company_profiles
                WHERE expo = %s AND proposal_sent = FALSE
                ORDER BY profiled_at DESC
                LIMIT %s
            """, (expo, limit))
            return [dict(r) for r in cur.fetchall()]

      expected_output: |
        [DB] Schema initialized: raw_staging, company_profiles, proposals, pipeline_runs
        [DB] Inserted new staging entry: https://logisea2025.com/exhibitors/pt-sinar
        [DB] Duplicate skipped: https://logisea2025.com/exhibitors/pt-sinar
        [DB] Upserted company profile: PT Sinar Logistik Nusantara (sinarlogistik.co.id)
        [DB] 12 unprocessed staging entries retrieved

    notes:
      - "ON CONFLICT DO NOTHING / DO UPDATE adalah pola idempotent yang aman, pipeline bisa restart tanpa duplikasi data"
      - "JSONB profile_card memungkinkan query JSON langsung: profile_card->>'company_name', profile_card @> '{\"industry\": \"logistics\"}'"
      - "gen_random_uuid() memerlukan PostgreSQL 13+ atau extension pgcrypto di versi lama"
      - "psycopg2.extras.RealDictCursor mengembalikan rows sebagai dict, tidak perlu mapping manual"
      - "Supabase free tier (500MB) sudah cukup untuk RETRO MVP dengan ratusan perusahaan"
      - "Gunakan connection pooling (PgBouncer atau psycopg2 ThreadedConnectionPool) untuk production dengan banyak concurrent workers"
    pitfalls:
      - "JANGAN buka connection baru setiap fungsi dipanggil, gunakan singleton connection dengan reconnect logic"
      - "JANGAN commit dalam loop per-row, batch commit setiap N rows untuk performance"
      - "JANGAN simpan binary file (PDF, gambar) di PostgreSQL TEXT atau BYTEA, simpan di MinIO dan simpan path di DB"
      - "autocommit=False berarti harus panggil conn.commit() setelah setiap write operation"
      - "psycopg2 tidak thread-safe, gunakan connection pool atau buat connection per thread/worker"

  - id: sqlite
    name: "SQLite"
    category: "Relational Database (Embedded)"
    description: >
      SQLite adalah embedded relational database yang menyimpan seluruh database
      dalam satu file. Tidak memerlukan server, zero-configuration, built-in di Python
      standard library (sqlite3). Sangat cocok untuk development RETRO dan single-machine
      deployment. Mendukung WAL mode untuk concurrent reads yang lebih baik. Tidak cocok
      untuk multi-machine deployment atau high-concurrency writes.
    specific_function: >
      Database untuk development dan testing RETRO secara lokal tanpa Docker atau
      PostgreSQL server. Cukup satu file .db untuk semua data pipeline. Bisa
      digunakan untuk production jika RETRO berjalan di satu mesin dengan traffic rendah.
    language: "Python (built-in sqlite3, atau SQLite via SQLModel)"
    pricing: "Free (public domain)"
    last_updated: "2025"
    url: "https://www.sqlite.org"
    retro:
      phase: "Semua Phase (development mode)"
      role: >
        Drop-in replacement PostgreSQL untuk development. Schema sama, kode hampir
        sama. Switch ke PostgreSQL untuk production hanya dengan mengubah DATABASE_URL.
      when_to_use: >
        Gunakan SQLite ketika developing RETRO di laptop tanpa Docker. Juga bisa
        digunakan untuk production jika: single machine, < 100 companies per run,
        tidak ada concurrent writes dari multiple workers.
      priority: "secondary (development)"
      output_goes_to: "Sama dengan PostgreSQL (development mode)"
    setup:
      install: "# Sudah built-in Python, tidak perlu install"
      requirements:
        - "Python 3.8+ (sqlite3 built-in)"
        - "aiosqlite (untuk async): pip install aiosqlite"
      env_vars:
        - name: DATABASE_URL
          description: "sqlite:///./retro_dev.db (SQLite) atau postgresql://... (PostgreSQL)"
    usage:
      basic_example: |
        import sqlite3
        import json
        import hashlib

        conn = sqlite3.connect("retro_dev.db")
        conn.row_factory = sqlite3.Row  # Akses kolom by name
        cur  = conn.cursor()

        # Aktifkan WAL mode untuk better concurrency
        cur.execute("PRAGMA journal_mode=WAL")
        cur.execute("PRAGMA foreign_keys=ON")

        # Schema sama dengan PostgreSQL (beberapa tipe berbeda)
        cur.execute("""
            CREATE TABLE IF NOT EXISTS raw_staging (
                id          INTEGER PRIMARY KEY AUTOINCREMENT,
                url         TEXT UNIQUE NOT NULL,
                url_hash    TEXT UNIQUE NOT NULL,
                domain      TEXT,
                source      TEXT,
                content     TEXT,
                metadata    TEXT DEFAULT '{}',  -- JSON as TEXT di SQLite
                crawled_at  TEXT DEFAULT (datetime('now')),
                processed   INTEGER DEFAULT 0   -- Boolean as INTEGER
            )
        """)
        conn.commit()

        # Insert
        url = "https://example.com/exhibitor"
        cur.execute("""
            INSERT OR IGNORE INTO raw_staging (url, url_hash, source, content)
            VALUES (?, ?, ?, ?)
        """, (url, hashlib.sha256(url.encode()).hexdigest(), "crawler", "<html>"))
        conn.commit()

        # Query
        cur.execute("SELECT * FROM raw_staging WHERE processed = 0 LIMIT 10")
        rows = [dict(r) for r in cur.fetchall()]
        print(rows)

      retro_example: |
        import sqlite3
        import json
        import hashlib
        import os

        DB_PATH = os.getenv("SQLITE_PATH", "./retro_dev.db")
        _conn = None

        def get_sqlite():
            global _conn
            if _conn is None:
                _conn = sqlite3.connect(DB_PATH, check_same_thread=False)
                _conn.row_factory = sqlite3.Row
                _conn.execute("PRAGMA journal_mode=WAL")
                _conn.execute("PRAGMA synchronous=NORMAL")
                _conn.execute("PRAGMA foreign_keys=ON")
                _init_sqlite_schema(_conn)
            return _conn

        def _init_sqlite_schema(conn):
            conn.executescript("""
                CREATE TABLE IF NOT EXISTS raw_staging (
                    id          INTEGER PRIMARY KEY AUTOINCREMENT,
                    url         TEXT UNIQUE NOT NULL,
                    url_hash    TEXT UNIQUE NOT NULL,
                    domain      TEXT,
                    source      TEXT,
                    content     TEXT,
                    metadata    TEXT DEFAULT '{}',
                    crawled_at  TEXT DEFAULT (datetime('now', 'utc')),
                    processed   INTEGER DEFAULT 0
                );
                CREATE TABLE IF NOT EXISTS company_profiles (
                    id              INTEGER PRIMARY KEY AUTOINCREMENT,
                    domain          TEXT UNIQUE NOT NULL,
                    company_name    TEXT NOT NULL,
                    industry        TEXT,
                    country         TEXT,
                    expo            TEXT,
                    profile_card    TEXT NOT NULL,
                    profiled_at     TEXT DEFAULT (datetime('now', 'utc')),
                    proposal_sent   INTEGER DEFAULT 0
                );
                CREATE TABLE IF NOT EXISTS proposals (
                    id              INTEGER PRIMARY KEY AUTOINCREMENT,
                    company_domain  TEXT,
                    expo            TEXT,
                    draft_html      TEXT,
                    final_pdf_path  TEXT,
                    status          TEXT DEFAULT 'draft',
                    created_at      TEXT DEFAULT (datetime('now', 'utc'))
                );
                CREATE INDEX IF NOT EXISTS idx_staging_processed ON raw_staging(processed);
            """)
            conn.commit()

        def upsert_raw_staging_sqlite(url: str, source: str, content: str) -> bool:
            conn = get_sqlite()
            url_hash = hashlib.sha256(url.encode()).hexdigest()
            cur  = conn.execute("""
                INSERT OR IGNORE INTO raw_staging (url, url_hash, source, content)
                VALUES (?, ?, ?, ?)
            """, (url, url_hash, source, content))
            conn.commit()
            return cur.rowcount > 0

      expected_output: |
        [SQLite] Database initialized: retro_dev.db (WAL mode)
        [SQLite] Schema ready: raw_staging, company_profiles, proposals
        [SQLite] Inserted: https://logisea2025.com/exhibitors/pt-sinar
        [SQLite] Skipped (duplicate): https://logisea2025.com/exhibitors/pt-sinar

    notes:
      - "WAL mode (PRAGMA journal_mode=WAL) memungkinkan concurrent readers saat writer aktif, WAJIB diaktifkan"
      - "SQLite menggunakan ? sebagai placeholder, PostgreSQL menggunakan %s. SQLModel/SQLAlchemy abstraksi ini"
      - "SQLite tidak mendukung BOOLEAN native, gunakan INTEGER 0/1. Tidak mendukung JSONB, simpan JSON sebagai TEXT"
      - "check_same_thread=False diperlukan untuk multi-thread access, tapi HATI-HATI dengan concurrent writes"
      - "Untuk switch ke PostgreSQL, hanya ganti DATABASE_URL dan beberapa sintaks (INSERT OR IGNORE -> INSERT ... ON CONFLICT)"
    pitfalls:
      - "SQLite tidak cocok untuk concurrent writes dari multiple processes/threads secara bersamaan"
      - "JANGAN gunakan SQLite jika Celery atau RQ workers berjalan di multiple processes"
      - "File .db harus di-backup manual karena tidak ada built-in replication"

  - id: sqlmodel
    name: "SQLModel"
    category: "ORM (Object-Relational Mapper)"
    description: >
      SQLModel adalah ORM Python yang dibuat oleh creator FastAPI (Sebastian Ramirez).
      Menggabungkan Pydantic v2 (data validation) dengan SQLAlchemy (database ORM)
      dalam satu definisi class. Model RETRO didefinisikan sekali dan otomatis berlaku
      sebagai Pydantic model (untuk API response/request validation) DAN SQLAlchemy
      model (untuk database operations). Mendukung PostgreSQL, MySQL, dan SQLite.
      Code lebih type-safe dan lebih sedikit boilerplate dibanding SQLAlchemy pure.
    specific_function: >
      Type-safe ORM untuk RETRO database models. Company, Proposal, PipelineRun
      didefinisikan sebagai SQLModel class yang otomatis generate tabel schema,
      validasi input, dan serialisasi ke JSON untuk API. Mengurangi bug karena
      type missmatch antar layer pipeline.
    language: "Python"
    pricing: "Free (open-source, MIT)"
    last_updated: "2025"
    url: "https://sqlmodel.tiangolo.com"
    retro:
      phase: "Semua Phase (ORM layer)"
      role: >
        Definisi model data RETRO yang type-safe. Semua operasi DB melalui SQLModel
        session untuk konsistensi dan type safety. Juga berfungsi sebagai Pydantic
        model untuk serialisasi Company Profile Card ke/dari JSON.
      when_to_use: >
        Gunakan SQLModel untuk semua interaksi database di RETRO kecuali raw query
        yang sangat complex (gunakan SQLAlchemy text() atau psycopg2 langsung untuk
        itu). Definisikan model sekali, gunakan di seluruh pipeline.
      priority: "primary (ORM layer)"
      output_goes_to: "PostgreSQL / SQLite (via SQLAlchemy engine)"
    setup:
      install: "pip install sqlmodel psycopg2-binary"
      requirements:
        - "sqlmodel>=0.0.18"
        - "psycopg2-binary (untuk PostgreSQL)"
      env_vars:
        - name: DATABASE_URL
          description: "postgresql://retro:retro@localhost/retro_db atau sqlite:///./retro.db"
    usage:
      basic_example: |
        from sqlmodel import SQLModel, Field, Session, create_engine, select
        from typing import Optional
        from datetime import datetime

        # Definisi model
        class Company(SQLModel, table=True):
            id:           Optional[int] = Field(default=None, primary_key=True)
            domain:       str = Field(unique=True, index=True)
            company_name: str
            industry:     Optional[str] = None
            profiled_at:  datetime = Field(default_factory=datetime.utcnow)

        # Setup engine
        engine = create_engine("postgresql://retro:retro@localhost/retro_db")
        SQLModel.metadata.create_all(engine)  # Create tables

        # Insert
        with Session(engine) as session:
            company = Company(domain="maju.co.id", company_name="PT Maju", industry="logistics")
            session.add(company)
            session.commit()
            session.refresh(company)
            print(f"ID: {company.id}")

        # Query
        with Session(engine) as session:
            results = session.exec(select(Company).where(Company.industry == "logistics")).all()
            for c in results:
                print(c.company_name, c.domain)

      retro_example: |
        from sqlmodel import SQLModel, Field, Session, create_engine, select, JSON, Column
        from sqlalchemy import Text
        from typing import Optional, Any
        from datetime import datetime
        import json
        import os

