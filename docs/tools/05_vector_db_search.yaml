    usage:
      basic_example: |
        from pymilvus import MilvusClient

        # Milvus Lite (tanpa Docker, simpan ke file lokal)
        client = MilvusClient("./retro_milvus.db")

        # Buat collection
        client.create_collection(
            collection_name="companies",
            dimension=384,
        )

        # Insert
        import numpy as np
        vec = np.random.rand(384).tolist()
        client.insert(
            collection_name="companies",
            data=[{"id": 1, "vector": vec, "company_name": "PT Maju", "domain": "maju.co.id"}],
        )

        # Search
        query_vec = np.random.rand(384).tolist()
        results = client.search(
            collection_name="companies",
