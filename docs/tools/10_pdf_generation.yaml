---
# RETRO Pipeline Tools Documentation
# Category: PDF Generation & Report Rendering
# File: 10_pdf_generation.yaml
# Purpose: Tools untuk menghasilkan proposal PDF profesional dari template HTML.
#          RETRO menggunakan LLM hanya untuk generate TEXT proposal (body teks),
#          kemudian formatter (WeasyPrint + Jinja2) yang mengubah teks menjadi PDF
#          dengan layout profesional. LLM TIDAK menangani layout, font, warna, dll.
#
# ARCHITECTURE PATTERN (TOKEN-EFFICIENT):
#   LLM -> teks proposal (JSON dengan sections) -> Jinja2 template -> HTML -> WeasyPrint -> PDF
#
# BENEFITS:
#   - LLM hanya generate teks, tidak tahu tentang CSS/HTML (hemat token signifikan)
#   - Layout konsisten di setiap proposal (tidak bergantung LLM untuk formatting)
#   - Template bisa diupdate tanpa re-generate teks
#   - PDF bisa di-customize per client tanpa LLM call tambahan
#
# RECOMMENDED STACK (RETRO):
#   Primary:   WeasyPrint + Jinja2 (HTML-to-PDF, CSS support, header/footer)
#   Template:  Jinja2 (Python native, mudah, powerful)
#   Fallback:  ReportLab (direct PDF generation tanpa HTML, lebih complex)
#   Dev/test:  Playwright PDF (Chrome-based, paling akurat tapi butuh browser)

tools:

  - id: weasyprint
    name: "WeasyPrint"
    category: "HTML-to-PDF Converter"
    description: >
      WeasyPrint adalah library Python yang mengkonversi HTML+CSS menjadi PDF dengan
      dukungan CSS yang sangat baik: flexbox, grid, page-break control, running headers
      dan footers, page numbers, SVG, dan web fonts. Berbasis Python murni (tidak
      memerlukan Chrome atau wkhtmltopdf). Menggunakan CSS Paged Media specification
      untuk control layout per halaman. Output berkualitas profesional. Cocok untuk
      RETRO karena proposal bisa di-design menggunakan HTML+CSS standar yang sudah
      dikenal semua web developer.
    specific_function: >
      Render HTML proposal template menjadi PDF yang siap dikirim ke potential partners.
      Jinja2 mengisi template dengan data dari LLM (teks proposal) dan Company Profile
      Card, kemudian WeasyPrint mengkonversi hasil HTML ke PDF yang branded dan
      profesional. Header dengan logo RETRO, footer dengan page numbers, dan
      typography yang konsisten setiap proposal.
    language: "Python"
    pricing: "Free (open-source, BSD)"
    last_updated: "2025"
    url: "https://weasyprint.org"
    retro:
      phase: "Phase 5 (Proposal Generation)"
      role: >
        PDF renderer untuk semua proposal RETRO. Menerima HTML yang dihasilkan Jinja2
        dan mengkonversi ke PDF berkualitas profesional. Output PDF disimpan ke MinIO
        proposals bucket dan di-attach ke email yang dikirim ke potential partners.
      when_to_use: >
        Gunakan WeasyPrint setiap kali Proposal Writer LLM selesai generate teks proposal.
        Pipeline: LLM output (JSON sections) -> Jinja2 render -> HTML string -> WeasyPrint -> PDF bytes.
        PDF bytes langsung di-upload ke MinIO tanpa disimpan ke disk.
      priority: "primary (PDF generation)"
      output_goes_to: "MinIO proposals bucket, Email Agent (attachment)"
    setup:
      install: |
        pip install weasyprint
        # Untuk sistem dependencies (Linux/WSL):
        # sudo apt-get install libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0
        # Untuk macOS:
        # brew install pango
        # Untuk Windows: WeasyPrint 61+ sudah bundled dengan binary dependencies
      requirements:
        - "weasyprint>=61.0"
        - "Jinja2>=3.1.0"
        - "System library: pango, fontconfig (auto-installed di Windows WeasyPrint 61+)"
      env_vars:
        - name: RETRO_LOGO_URL
          description: "URL atau path ke logo RETRO untuk header proposal"
        - name: PROPOSAL_TEMPLATE_DIR
          description: "Path ke direktori templates Jinja2, default './templates'"
    usage:
      basic_example: |
        from weasyprint import HTML, CSS
        from weasyprint.text.fonts import FontConfiguration
        import io

        # Dari HTML string
        html_content = """
        <!DOCTYPE html>
        <html>
        <head>
          <style>
            @page { size: A4; margin: 2cm; }
            body { font-family: 'Arial', sans-serif; font-size: 11pt; color: #333; }
            h1 { color: #1a1a2e; border-bottom: 2px solid #e94560; }
          </style>
        </head>
        <body>
          <h1>Partnership Proposal</h1>
          <p>Dear PT Sinar Logistik Team,</p>
          <p>We are pleased to propose a strategic partnership...</p>
        </body>
        </html>
        """

        # Render ke file
        HTML(string=html_content).write_pdf("/tmp/proposal.pdf")

        # Render ke bytes (untuk upload ke MinIO tanpa disk)
        pdf_bytes = HTML(string=html_content).write_pdf()
        print(f"PDF size: {len(pdf_bytes):,} bytes")

        # Dengan external CSS file
        css = CSS(filename="proposal.css")
        pdf_bytes = HTML(string=html_content).write_pdf(stylesheets=[css])

      retro_example: |
        from weasyprint import HTML, CSS
        from jinja2 import Environment, FileSystemLoader, select_autoescape
        import os
        import io
        from datetime import date

        TEMPLATE_DIR = os.getenv("PROPOSAL_TEMPLATE_DIR", "./templates")
        RETRO_BRAND  = {
            "company_name": "RETRO Intelligence Platform",
            "tagline":      "Autonomous B2B Partnership Intelligence",
            "logo_url":     os.getenv("RETRO_LOGO_URL", ""),
            "website":      "https://retro.id",
            "email":        "partnership@retro.id",
            "phone":        "+62-21-XXXX-XXXX",
            "address":      "Jakarta, Indonesia",
        }

        # Setup Jinja2 environment
        _jinja_env = None
        def get_jinja():
            global _jinja_env
            if _jinja_env is None:
                _jinja_env = Environment(
                    loader=FileSystemLoader(TEMPLATE_DIR),
                    autoescape=select_autoescape(["html", "xml"]),
                )
            return _jinja_env

        def render_proposal_html(
            profile_card:       dict,
            proposal_sections:  dict,
            proposal_number:    str,
        ) -> str:
            """
            Render Jinja2 template menjadi HTML string.

            proposal_sections: dict dari LLM output dengan keys:
                - executive_summary: teks opening paragraph
                - about_retro: deskripsi singkat RETRO
                - collaboration_opportunity: mengapa kolaborasi ini menarik
                - proposed_collaboration: detail apa yang diusulkan
                - value_proposition: manfaat bagi partner
                - next_steps: action items
                - closing: closing paragraph
            """
            env = get_jinja()
            template = env.get_template("proposal.html.j2")

            html = template.render(
                # Branding
                retro=RETRO_BRAND,

                # Target company
                company=profile_card,

                # Proposal content dari LLM
                proposal=proposal_sections,

                # Metadata
                proposal_number=proposal_number,
                date_str=date.today().strftime("%d %B %Y"),
                expo_name=profile_card.get("expo", "Business Expo 2025"),
            )
            return html

        def generate_proposal_pdf(
            profile_card:       dict,
            proposal_sections:  dict,
            proposal_number:    str,
        ) -> bytes:
            """
            Full pipeline: proposal data -> HTML -> PDF bytes.
            Return: PDF as bytes (untuk langsung upload ke MinIO).
            """
            html_content = render_proposal_html(
                profile_card=profile_card,
                proposal_sections=proposal_sections,
                proposal_number=proposal_number,
            )

            # WeasyPrint: HTML string -> PDF bytes
            pdf_bytes = HTML(
                string=html_content,
                base_url=TEMPLATE_DIR,  # Untuk resolving relative CSS/image paths
            ).write_pdf(
                uncompressed_pdf=False,  # Compress PDF
                optimize_images=True,
            )

            print(f"[WeasyPrint] Generated PDF: {len(pdf_bytes):,} bytes ({len(pdf_bytes)/1024:.1f} KB)")
            return pdf_bytes

        def generate_and_upload_proposal(
            profile_card:      dict,
            proposal_sections: dict,
            expo_name:         str,
        ) -> str:
            """End-to-end: generate PDF dan upload ke MinIO. Return MinIO object key."""
            from retro.storage.minio_client import upload_proposal_bytes

            proposal_number = f"RETRO-{date.today().strftime('%Y%m')}-{profile_card['domain'][:6].upper()}"
            pdf_bytes = generate_proposal_pdf(profile_card, proposal_sections, proposal_number)

            object_key = upload_proposal_bytes(pdf_bytes, profile_card["domain"], expo_name)
            print(f"[Proposal] Uploaded: {object_key}")
            return object_key

      expected_output: |
        [WeasyPrint] Generated PDF: 284,672 bytes (278.0 KB)
        [Proposal] Uploaded: LogiSEA_2025/sinarlogistik.co.id/proposal.pdf

        # PDF berisi:
        # - Header: Logo RETRO + nama perusahaan + proposal number
        # - Page 1: Cover page dengan nama partner, tanggal, expo
        # - Page 2-4: Isi proposal (executive summary, collaboration opportunity, dll)
        # - Page 5: Next steps dan CTA
        # - Footer setiap halaman: "Confidential | RETRO Intelligence Platform | Halaman X dari Y"

    notes:
      - "base_url=TEMPLATE_DIR penting untuk WeasyPrint bisa resolve relative path ke CSS dan image files di template"
      - "optimize_images=True mengkompresi gambar di PDF, mengurangi file size signifikan"
      - "@page CSS rule mengontrol ukuran kertas (A4), margin, dan running headers/footers"
      - "WeasyPrint 61+ di Windows sudah bundled binary dependencies (pango, dll), tidak perlu install manual"
      - "Untuk header/footer dengan page numbers: gunakan CSS Paged Media @page dan position: running(header)"
      - "Web fonts (Google Fonts) bisa digunakan di WeasyPrint jika online, atau sertakan font files lokal di template"
    pitfalls:
      - "WeasyPrint versi < 61 di Windows sering crash karena library dependency masalah, upgrade ke >= 61"
      - "JANGAN load external images dari URL di WeasyPrint jika environment tidak ada internet, embed sebagai base64"
      - "CSS flexbox dan grid didukung tapi tidak 100% identik dengan Chrome, test render sebelum production"
      - "PDF generation bisa lambat untuk template dengan banyak CSS kompleks (> 5 detik untuk 10 halaman)"

  - id: jinja2
    name: "Jinja2"
    category: "Template Engine"
    description: >
      Jinja2 adalah template engine Python yang sangat powerful. Memungkinkan membuat
      HTML template dengan variabel, loop, kondisi, dan inheritance (extends). RETRO
      menggunakan Jinja2 untuk proposal HTML templates: satu base template dengan
      branding RETRO, dan specific templates untuk berbagai industri (logistics,
      manufacturing, technology). Template dapat di-customize per expo tanpa mengubah
      kode Python. Autoescape mencegah XSS injection dari data perusahaan yang
      mengandung HTML characters.
    specific_function: >
      HTML template rendering untuk proposal RETRO. Jinja2 mengisi template dengan:
      company profile data, teks proposal dari LLM, branding RETRO, dan metadata
      seperti tanggal dan proposal number. Output HTML kemudian di-render ke PDF
      oleh WeasyPrint.
    language: "Python"
    pricing: "Free (open-source, BSD)"
    last_updated: "2025"
    url: "https://jinja.palletsprojects.com"
    retro:
      phase: "Phase 5 (Proposal Template Rendering)"
      role: >
        Template engine antara LLM output dan WeasyPrint. LLM menghasilkan teks
        proposal sebagai JSON dict, Jinja2 menyusun teks tersebut ke dalam template
        HTML yang terstruktur dan branded, kemudian WeasyPrint mengkonversi ke PDF.
      when_to_use: >
        Gunakan Jinja2 untuk semua HTML generation di RETRO: proposal, email body,
        dan laporan internal. Jangan generate HTML manual dengan string concatenation.
      priority: "primary (template rendering)"
      output_goes_to: "WeasyPrint (HTML -> PDF)"
    setup:
      install: "pip install Jinja2"
      requirements:
        - "Jinja2>=3.1.0"
        - "MarkupSafe>=2.1.0 (dependency Jinja2, auto-installed)"
      env_vars:
        - name: PROPOSAL_TEMPLATE_DIR
          description: "Path ke direktori template, default './templates'"
    usage:
      basic_example: |
        from jinja2 import Environment, FileSystemLoader, select_autoescape

        env = Environment(
            loader=FileSystemLoader("./templates"),
            autoescape=select_autoescape(["html", "xml"]),  # Proteksi XSS
        )

        # Contoh template: templates/proposal.html.j2
        # <h1>Dear {{ company.company_name }} Team,</h1>
        # {% if proposal.executive_summary %}
        # <p>{{ proposal.executive_summary }}</p>
        # {% endif %}
        # {% for item in proposal.next_steps %}
        # <li>{{ item }}</li>
        # {% endfor %}

        template = env.get_template("proposal.html.j2")
        html = template.render(
            company={"company_name": "PT Sinar Logistik", "industry": "Logistics"},
            proposal={"executive_summary": "We are pleased to propose..."},
            date_str="23 April 2025",
        )
        print(html)

      retro_example: |
        # File: templates/proposal.html.j2
        PROPOSAL_TEMPLATE_CONTENT = '''
