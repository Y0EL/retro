---
# RETRO Pipeline Tools Documentation
# Category: Vector Database & Semantic Search
# File: 05_vector_db_search.yaml
# Purpose: Stores company embeddings produced by sentence-transformers (see 04_nlp_entity_extraction.yaml)
#          and enables semantic similarity search so Synthesis Agent can find matching companies
#          without keyword collision. All tools in this file operate in Phase 4 (Vector Storage)
#          and Phase 5 (Synthesis) of the RETRO pipeline.
#
# ARCHITECTURE NOTE:
#   sentence-transformers (04) --> embedding vectors (768-dim) --> stored HERE
#   Synthesis Agent queries HERE --> ranked company profiles --> sent to LLM context window
#
# RECOMMENDED STACK (minimal viable RETRO):
#   Primary:   Qdrant (self-hosted Docker, HTTP API, excellent filtering)
#   Embedding: sentence-transformers/all-MiniLM-L6-v2 (local, 768-dim)
#   Fallback:  FAISS (in-memory, zero infra cost, no persistence)

tools:

  - id: qdrant
    name: "Qdrant"
    category: "Vector Database"
    description: >
      Qdrant adalah vector database open-source yang ditulis dalam Rust. Dirancang
      khusus untuk menyimpan dan mencari high-dimensional embedding vectors secara
      efisien. Mendukung payload filtering (filter by metadata), named vectors
      (multiple vector spaces per document), shard replication, dan REST/gRPC API.
      Tersedia sebagai Docker image (self-hosted), binary, dan Qdrant Cloud (managed).
      RETRO menggunakan Qdrant sebagai penyimpanan utama Company Profile embeddings
      sehingga Synthesis Agent bisa mencari perusahaan yang paling relevan secara
      semantik bukan hanya keyword matching.
    specific_function: >
      Menyimpan embedding vector dari setiap company profile card yang dihasilkan
      Context Agent. Setiap vector dilengkapi payload JSON berisi nama perusahaan,
      industri, domain, sumber data, dan timestamp. Synthesis Agent melakukan
      similarity search terhadap RETRO company embedding untuk menemukan kandidat
      kolaborasi terbaik.
    language: "Python (qdrant-client), REST API, gRPC"
    pricing: "Free (self-hosted), Qdrant Cloud mulai $0 (1GB free tier)"
    last_updated: "2025"
    url: "https://qdrant.tech"
    retro:
      phase: "Phase 4 (Vector Storage) + Phase 5 (Synthesis Query)"
      role: >
        Penyimpanan utama semua company profile embeddings. Setiap perusahaan yang
        berhasil di-profile Context Agent disimpan sebagai satu Qdrant point dengan
        vector 768-dim dan payload metadata. Synthesis Agent query Qdrant untuk
        mendapatkan Top-K perusahaan yang paling mirip secara semantik dengan
        profile RETRO sendiri.
      when_to_use: >
        Gunakan setiap kali Context Agent selesai membuat Company Profile Card.
        Upsert embedding ke Qdrant segera setelah profiling selesai. Query Qdrant
        ketika Synthesis Agent perlu memilih kandidat terbaik dari pool perusahaan
        yang sudah di-profile. Juga gunakan untuk dedup semantik: jika company baru
        memiliki cosine similarity > 0.97 dengan entry existing, kemungkinan duplikat
        dan bisa di-skip atau di-merge.
      priority: "primary"
      output_goes_to: "Synthesis Agent (ranked company list with scores)"
    setup:
      install: "pip install qdrant-client"
      docker: "docker run -p 6333:6333 -p 6334:6334 -v $(pwd)/qdrant_storage:/qdrant/storage qdrant/qdrant"
      requirements:
        - "Docker Desktop (untuk self-hosted)"
        - "qdrant-client>=1.7.0"
        - "sentence-transformers (untuk generate embeddings sebelum upsert)"
      env_vars:
        - name: QDRANT_URL
          description: "URL Qdrant instance, default http://localhost:6333"
        - name: QDRANT_API_KEY
          description: "Hanya diperlukan untuk Qdrant Cloud, kosongkan untuk self-hosted"
    usage:
      basic_example: |
        from qdrant_client import QdrantClient
        from qdrant_client.models import Distance, VectorParams, PointStruct

        client = QdrantClient(url="http://localhost:6333")

        # Buat collection baru
        client.create_collection(
            collection_name="companies",
            vectors_config=VectorParams(size=768, distance=Distance.COSINE),
        )

        # Upsert satu point
        client.upsert(
            collection_name="companies",
            points=[
                PointStruct(
                    id=1,
                    vector=[0.1, 0.2, ...],  # 768-dim float list
                    payload={"company_name": "PT Maju Bersama", "industry": "logistics"},
                )
            ],
        )

        # Search
        results = client.search(
            collection_name="companies",
            query_vector=[0.15, 0.22, ...],
            limit=5,
        )
        for r in results:
            print(r.score, r.payload["company_name"])

      retro_example: |
        import os
        import uuid
        import json
        from qdrant_client import QdrantClient
        from qdrant_client.models import (
            Distance, VectorParams, PointStruct,
            Filter, FieldCondition, MatchValue,
            PayloadSchemaType,
        )
        from sentence_transformers import SentenceTransformer

        QDRANT_URL = os.getenv("QDRANT_URL", "http://localhost:6333")
        COLLECTION  = "retro_companies"
        EMBED_MODEL = "all-MiniLM-L6-v2"

        _qdrant_client = None
        _embed_model   = None

        def get_qdrant():
            global _qdrant_client
            if _qdrant_client is None:
                _qdrant_client = QdrantClient(url=QDRANT_URL)
                _ensure_collection(_qdrant_client)
            return _qdrant_client

        def get_embedder():
            global _embed_model
            if _embed_model is None:
                _embed_model = SentenceTransformer(EMBED_MODEL)
            return _embed_model

        def _ensure_collection(client):
            existing = [c.name for c in client.get_collections().collections]
            if COLLECTION not in existing:
                client.create_collection(
                    collection_name=COLLECTION,
                    vectors_config=VectorParams(size=384, distance=Distance.COSINE),
                )
                # Index payload fields for fast filtering
                client.create_payload_index(COLLECTION, "industry", PayloadSchemaType.KEYWORD)
                client.create_payload_index(COLLECTION, "country",  PayloadSchemaType.KEYWORD)
                client.create_payload_index(COLLECTION, "expo",     PayloadSchemaType.KEYWORD)
                print(f"[Qdrant] Collection '{COLLECTION}' created.")

        def build_embedding_text(profile_card: dict) -> str:
            """
            Gabungkan field terpenting dari Company Profile Card menjadi satu
            string untuk di-embed. Urutan field mempengaruhi bobot semantik.
            """
            parts = [
                profile_card.get("company_name", ""),
                profile_card.get("tagline", ""),
                profile_card.get("industry", ""),
                profile_card.get("products_services", ""),
                profile_card.get("value_proposition", ""),
                " ".join(profile_card.get("keywords", [])),
            ]
            return " | ".join(p for p in parts if p)

        def upsert_company_profile(profile_card: dict, expo_name: str) -> str:
            """
            Simpan Company Profile Card ke Qdrant setelah Context Agent selesai.
            Return: point_id (UUID string)
            """
            client   = get_qdrant()
            embedder = get_embedder()

            text      = build_embedding_text(profile_card)
            vector    = embedder.encode(text, normalize_embeddings=True).tolist()
            point_id  = str(uuid.uuid5(uuid.NAMESPACE_URL, profile_card["domain"]))

            payload = {
                "company_name":       profile_card.get("company_name"),
                "domain":             profile_card.get("domain"),
                "industry":           profile_card.get("industry"),
                "country":            profile_card.get("country"),
                "expo":               expo_name,
                "value_proposition":  profile_card.get("value_proposition"),
                "keywords":           profile_card.get("keywords", []),
                "profile_card_json":  json.dumps(profile_card),
                "profiled_at":        profile_card.get("profiled_at"),
            }

            client.upsert(
                collection_name=COLLECTION,
                points=[PointStruct(id=point_id, vector=vector, payload=payload)],
            )
            print(f"[Qdrant] Upserted: {profile_card['company_name']} ({point_id})")
            return point_id

        def search_similar_companies(
            retro_profile_text: str,
            top_k: int = 20,
            filter_industry: str | None = None,
            filter_expo: str | None = None,
            score_threshold: float = 0.55,
        ) -> list[dict]:
            """
            Synthesis Agent memanggil fungsi ini untuk menemukan kandidat
            kolaborasi terbaik berdasarkan kemiripan semantik.
            """
            client   = get_qdrant()
            embedder = get_embedder()

            query_vec = embedder.encode(retro_profile_text, normalize_embeddings=True).tolist()

            # Bangun filter opsional
            conditions = []
            if filter_industry:
                conditions.append(FieldCondition(key="industry", match=MatchValue(value=filter_industry)))
            if filter_expo:
                conditions.append(FieldCondition(key="expo",     match=MatchValue(value=filter_expo)))

            search_filter = Filter(must=conditions) if conditions else None

            results = client.search(
                collection_name=COLLECTION,
                query_vector=query_vec,
                limit=top_k,
                score_threshold=score_threshold,
                query_filter=search_filter,
                with_payload=True,
            )

            candidates = []
            for r in results:
                card = json.loads(r.payload["profile_card_json"])
                candidates.append({
                    "similarity_score": round(r.score, 4),
                    "company_name":     r.payload["company_name"],
                    "domain":           r.payload["domain"],
                    "profile_card":     card,
                })
            return candidates

        def is_semantic_duplicate(profile_card: dict, threshold: float = 0.97) -> bool:
            """
            Cek apakah company sudah ada di Qdrant secara semantik (bukan hanya domain).
            Berguna untuk deteksi duplikat dengan nama berbeda tapi company sama.
            """
            client   = get_qdrant()
            embedder = get_embedder()

            text      = build_embedding_text(profile_card)
            query_vec = embedder.encode(text, normalize_embeddings=True).tolist()

            results = client.search(
                collection_name=COLLECTION,
                query_vector=query_vec,
                limit=1,
                score_threshold=threshold,
                with_payload=True,
            )
            if results:
                existing = results[0].payload["company_name"]
                print(f"[Qdrant] Semantic duplicate detected: '{profile_card['company_name']}' ~ '{existing}' (score={results[0].score:.4f})")
                return True
            return False

        # ---- Contoh penggunaan oleh Synthesis Agent ----
        if __name__ == "__main__":
            RETRO_PROFILE_TEXT = (
                "RETRO adalah platform B2B intelligence untuk corporate partnerships "
                "di sektor logistik, supply chain, dan manufaktur Indonesia. "
                "Kami mencari perusahaan teknologi, distributor, dan integrator sistem."
            )

            candidates = search_similar_companies(
                retro_profile_text=RETRO_PROFILE_TEXT,
                top_k=20,
                filter_expo="LogiSEA 2025",
                score_threshold=0.60,
            )
            for c in candidates:
                print(f"  [{c['similarity_score']:.4f}] {c['company_name']} | {c['domain']}")

      expected_output: |
        [Qdrant] Collection 'retro_companies' created.
        [Qdrant] Upserted: PT Sinar Logistik Nusantara (a3f7c2d1-...)
        [Qdrant] Upserted: Global Supply Chain Solutions (b1e4d9a2-...)

        Synthesis Agent search results:
          [0.8821] PT Sinar Logistik Nusantara | sinarlogistik.co.id
          [0.8345] Global Supply Chain Solutions | gsc-solutions.com
          [0.7912] Nexus Distribution Hub | nexusdist.sg
          [0.7103] APAC Freight Technologies | apacfreight.io
          [0.6891] IndoPort Logistics | indoportlog.com

    notes:
      - "Gunakan UUID v5 dengan namespace URL dan domain sebagai name untuk point ID yang deterministik dan idempotent (upsert berkali-kali aman, tidak duplikat)"
      - "Vector size HARUS match dengan model embedding: all-MiniLM-L6-v2 = 384-dim, all-mpnet-base-v2 = 768-dim. Tentukan saat create_collection dan jangan ubah."
      - "normalize_embeddings=True wajib aktif di sentence-transformers agar cosine similarity bekerja benar di Qdrant"
      - "payload_index pada field industry/country/expo memungkinkan Qdrant melakukan pre-filter sebelum vector search, jauh lebih cepat dari full scan"
      - "Qdrant mendukung upsert (update jika ID sudah ada), sehingga re-profiling perusahaan yang sama akan menimpa entry lama"
      - "Gunakan Qdrant Docker volume mount ke local folder agar data persisten setelah container restart"
      - "score_threshold 0.55-0.65 cocok untuk general similarity, naikkan ke 0.80+ jika hanya ingin hasil yang sangat mirip"
    pitfalls:
      - "JANGAN buat collection ulang setiap run, cek existing collections dulu dengan get_collections()"
      - "JANGAN simpan raw PDF atau teks panjang di payload, simpan hanya metadata compact. Profile card JSON boleh tapi harus di-compress jika besar"
      - "JANGAN lupa jalankan Docker Qdrant sebelum menjalankan pipeline. Tanpa Qdrant running, semua upsert akan gagal dengan ConnectionRefused"
      - "UUID v5 menggunakan domain sebagai seed, sehingga subdomain berbeda (shop.example.com vs www.example.com) akan menghasilkan UUID berbeda. Normalisasi domain dengan tldextract sebelum generate UUID"
      - "Qdrant Cloud free tier hanya 1GB storage dan 1 collection. Untuk production RETRO, gunakan self-hosted atau upgrade ke paid plan"

  - id: chromadb
    name: "ChromaDB"
    category: "Vector Database"
    description: >
      ChromaDB adalah vector database open-source yang dibuat dengan Python-first API.
      Sangat mudah di-setup (tidak perlu Docker, bisa in-process), mendukung persistence
      ke disk, dan memiliki built-in embedding function (bisa pakai sentence-transformers
      atau OpenAI embeddings). Cocok untuk prototyping cepat dan pengembangan lokal RETRO
      sebelum migrasi ke Qdrant untuk production.
    specific_function: >
      Alternatif ringan untuk Qdrant selama development dan testing. Tidak perlu
      Docker, langsung berjalan sebagai library Python dengan persistence ke folder
      lokal. Synthesis Agent bisa query ChromaDB dengan query string langsung
      (tanpa perlu generate embedding manual, ChromaDB handle sendiri).
    language: "Python"
    pricing: "Free (open-source)"
    last_updated: "2025"
    url: "https://www.trychroma.com"
    retro:
      phase: "Phase 4 (Vector Storage) - Development/Testing alternatif"
      role: >
        Digunakan saat development dan testing pipeline RETRO secara lokal tanpa
        perlu menjalankan Docker. Setelah pipeline stabil, migrasi ke Qdrant untuk
        production.
      when_to_use: >
        Gunakan ChromaDB ketika ingin prototype cepat tanpa setup infrastruktur.
        Jangan gunakan di production RETRO karena tidak se-scalable Qdrant dan
        kurang fitur filtering yang advanced.
      priority: "secondary (development only)"
      output_goes_to: "Synthesis Agent (kandidat companies, development mode)"
    setup:
      install: "pip install chromadb"
      requirements:
        - "chromadb>=0.4.0"
        - "sentence-transformers (optional, ChromaDB punya built-in)"
      env_vars: []
    usage:
      basic_example: |
        import chromadb
        from chromadb.utils import embedding_functions

        # In-memory (tidak persistent)
        client = chromadb.Client()

        # Persistent ke disk
        client = chromadb.PersistentClient(path="./chroma_storage")

        # Buat collection dengan sentence-transformers embedding
        ef = embedding_functions.SentenceTransformerEmbeddingFunction(
            model_name="all-MiniLM-L6-v2"
        )
        collection = client.get_or_create_collection(
            name="companies",
            embedding_function=ef,
        )

        # Tambah dokumen (ChromaDB auto-embed)
        collection.add(
            documents=["PT Maju Bersama is a logistics technology company in Jakarta"],
            metadatas=[{"industry": "logistics", "country": "Indonesia"}],
            ids=["company-001"],
        )

        # Query dengan teks (ChromaDB auto-embed query juga)
        results = collection.query(
            query_texts=["supply chain technology partnerships"],
            n_results=5,
        )
        print(results["documents"])

      retro_example: |
        import chromadb
        from chromadb.utils import embedding_functions

        CHROMA_PATH = "./retro_chroma_dev"
        COLLECTION_NAME = "retro_companies_dev"

        _chroma_collection = None

        def get_collection():
            global _chroma_collection
            if _chroma_collection is None:
                client = chromadb.PersistentClient(path=CHROMA_PATH)
                ef = embedding_functions.SentenceTransformerEmbeddingFunction(
                    model_name="all-MiniLM-L6-v2"
                )
                _chroma_collection = client.get_or_create_collection(
                    name=COLLECTION_NAME,
                    embedding_function=ef,
                    metadata={"hnsw:space": "cosine"},  # Gunakan cosine similarity
                )
            return _chroma_collection

        def upsert_company_chroma(profile_card: dict, expo_name: str):
            collection = get_collection()
            company_id = f"company-{profile_card['domain'].replace('.', '-')}"
            doc_text   = (
                f"{profile_card['company_name']}. "
                f"{profile_card.get('tagline', '')}. "
                f"{profile_card.get('products_services', '')}. "
                f"{profile_card.get('value_proposition', '')}."
            )
            metadata = {
                "company_name": profile_card["company_name"],
                "domain":       profile_card["domain"],
                "industry":     profile_card.get("industry", ""),
                "expo":         expo_name,
            }
            collection.upsert(
                documents=[doc_text],
                metadatas=[metadata],
                ids=[company_id],
            )

        def search_chroma(query_text: str, top_k: int = 10, expo: str | None = None):
            collection = get_collection()
            where = {"expo": expo} if expo else None
            results = collection.query(
                query_texts=[query_text],
                n_results=top_k,
                where=where,
            )
            output = []
            for i, meta in enumerate(results["metadatas"][0]):
                output.append({
                    "company_name": meta["company_name"],
                    "domain":       meta["domain"],
                    "distance":     results["distances"][0][i],
                })
            return output

      expected_output: |
        [
          {"company_name": "PT Sinar Logistik", "domain": "sinarlogistik.co.id", "distance": 0.211},
          {"company_name": "Global SCM Tech",   "domain": "globalscm.io",         "distance": 0.298},
        ]
        # Catatan: ChromaDB output distance bukan similarity, semakin kecil = semakin mirip

    notes:
      - "ChromaDB distance adalah 1 - cosine_similarity, jadi 0.0 = identik, 2.0 = berlawanan"
      - "PersistentClient menyimpan data ke folder lokal, restart Python tidak kehilangan data"
      - "ChromaDB bisa auto-embed dokumen dan query sekaligus jika embedding_function di-set di collection"
      - "Filter metadata di ChromaDB hanya mendukung equality match sederhana (where={'field': 'value'}), tidak se-powerful Qdrant"
      - "Untuk production RETRO dengan ribuan perusahaan, pindah ke Qdrant yang lebih scalable"
    pitfalls:
      - "ChromaDB WHERE filter hanya support satu key satu value per query dalam versi lama, cek dokumentasi versi terbaru untuk AND/OR support"
      - "upsert() di ChromaDB memerlukan ID unik yang konsisten, gunakan domain-based ID yang deterministik"
      - "JANGAN mix dokumen dengan dan tanpa embedding_function dalam satu collection"

  - id: faiss
    name: "FAISS (Facebook AI Similarity Search)"
    category: "Vector Search Library"
    description: >
      FAISS adalah library C++ dengan Python binding dari Meta/Facebook untuk
      approximate nearest neighbor search pada vector spaces. Tidak memerlukan
      server atau Docker, berjalan sepenuhnya in-memory. Sangat cepat untuk
      batch similarity search. Tidak memiliki built-in persistence (harus save/load
      index manual ke file). Cocok sebagai fallback ketika Qdrant tidak tersedia
      atau untuk batch processing offline yang tidak membutuhkan real-time query.
    specific_function: >
      In-memory similarity search engine sebagai fallback Qdrant. Berguna
      untuk batch processing satu kali (load semua embeddings dari DB, search,
      buang). Tidak ada overhead server.
    language: "Python (faiss-cpu / faiss-gpu)"
    pricing: "Free (open-source, Meta)"
    last_updated: "2025"
    url: "https://github.com/facebookresearch/faiss"
    retro:
      phase: "Phase 5 (Synthesis) - Fallback / Offline Batch"
      role: >
        Digunakan ketika Synthesis Agent perlu melakukan batch similarity search
        satu kali terhadap seluruh company pool tanpa kebutuhan real-time query.
        Juga berguna sebagai fallback jika Qdrant down.
      when_to_use: >
        Gunakan FAISS untuk offline batch processing: misalnya awal minggu, load
        semua embeddings dari PostgreSQL, buat FAISS index, cari Top-50 matches,
        simpan hasil ke DB, lalu buang FAISS index. Jangan gunakan sebagai
        pengganti Qdrant untuk real-time online search.
      priority: "fallback / offline batch"
      output_goes_to: "Synthesis Agent batch results, PostgreSQL ranking table"
    setup:
      install: "pip install faiss-cpu  # CPU version, cukup untuk RETRO"
      requirements:
        - "faiss-cpu>=1.7.0"
        - "numpy"
        - "sentence-transformers (untuk generate embeddings)"
      env_vars: []
    usage:
      basic_example: |
        import faiss
        import numpy as np

        # Buat index cosine similarity (Inner Product setelah normalisasi = cosine)
        dim = 384  # sesuaikan dengan model embedding
        index = faiss.IndexFlatIP(dim)  # IP = Inner Product

        # Tambah vectors (harus numpy float32, normalize dulu untuk cosine)
        vectors = np.random.rand(100, dim).astype(np.float32)
        faiss.normalize_L2(vectors)  # Normalize untuk cosine similarity
        index.add(vectors)

        # Search
        query = np.random.rand(1, dim).astype(np.float32)
        faiss.normalize_L2(query)
        distances, indices = index.search(query, k=5)
        print("Top-5 matches:", indices[0], "Scores:", distances[0])

      retro_example: |
        import faiss
        import numpy as np
        import json
        from sentence_transformers import SentenceTransformer

        def batch_similarity_search_faiss(
            profiles: list[dict],
            retro_profile_text: str,
            top_k: int = 20,
        ) -> list[dict]:
            """
            Offline batch search: semua company profiles diload ke memory,
            di-embed, diindex FAISS, lalu di-search. Dibuang setelah selesai.

            profiles: list of Company Profile Card dicts dari PostgreSQL
            """
            embedder = SentenceTransformer("all-MiniLM-L6-v2")
            dim = 384

            # 1. Build teks untuk setiap company
            texts = []
            for p in profiles:
                t = (
                    f"{p.get('company_name', '')} "
                    f"{p.get('industry', '')} "
                    f"{p.get('products_services', '')} "
                    f"{p.get('value_proposition', '')}"
                )
                texts.append(t)

            # 2. Encode semua sekaligus (batch lebih efisien)
            embeddings = embedder.encode(
                texts,
                normalize_embeddings=True,
                batch_size=64,
                show_progress_bar=True,
            ).astype(np.float32)

            # 3. Build FAISS index
            index = faiss.IndexFlatIP(dim)
            index.add(embeddings)

            # 4. Encode query
            query_vec = embedder.encode(
                [retro_profile_text],
                normalize_embeddings=True,
            ).astype(np.float32)

            # 5. Search
            scores, indices = index.search(query_vec, k=top_k)

            # 6. Compile hasil
            results = []
            for score, idx in zip(scores[0], indices[0]):
                if idx == -1:  # FAISS returns -1 for unfilled slots
                    continue
                results.append({
                    "similarity_score": float(score),
                    "company_name":     profiles[idx]["company_name"],
                    "domain":           profiles[idx]["domain"],
                    "profile_card":     profiles[idx],
                })

            # Index di-garbage-collected setelah return (tidak persisten)
            return results

        # Contoh: load profiles dari PostgreSQL lalu batch search
        if __name__ == "__main__":
            import psycopg2

            conn = psycopg2.connect("postgresql://retro:retro@localhost/retro_db")
            cur  = conn.cursor()
            cur.execute("SELECT profile_card_json FROM companies WHERE profiled = TRUE")
            rows = cur.fetchall()
            profiles = [json.loads(r[0]) for r in rows]

            RETRO_TEXT = (
                "RETRO mencari mitra logistik dan supply chain teknologi "
                "untuk kolaborasi B2B di pasar ASEAN."
            )

            results = batch_similarity_search_faiss(profiles, RETRO_TEXT, top_k=20)
            for r in results[:5]:
                print(f"  [{r['similarity_score']:.4f}] {r['company_name']}")

      expected_output: |
        Encoding 500 company profiles...: 100%|██████████| 8/8 [00:12<00:00,  1.56s/it]
          [0.9123] PT Sinar Logistik Nusantara
          [0.8847] Global SCM Technologies
          [0.8612] APAC Freight Solutions
          [0.8341] Nexus Distribution Hub
          [0.8105] IndoPort Digital Cargo

    notes:
      - "FAISS tidak memiliki persistence built-in. Gunakan faiss.write_index(index, 'file.index') dan faiss.read_index('file.index') untuk simpan/load manual"
      - "IndexFlatIP dengan normalize_L2 menghasilkan cosine similarity (bukan euclidean), pastikan normalize SEBELUM add dan search"
      - "Untuk lebih dari 1 juta vectors, gunakan IndexIVFFlat (approximate, lebih cepat) bukan IndexFlatIP (exact, lambat di scale besar)"
      - "FAISS sangat memory-intensive: 1 juta vectors x 384 dim x 4 bytes = ~1.5GB RAM"
      - "batch_size=64 saat encode adalah tradeoff speed vs memory, naikkan ke 128+ jika RAM mencukupi"
    pitfalls:
      - "JANGAN lupa normalize_L2 SEBELUM add() dan SEBELUM search(), tanpa ini hasilnya bukan cosine similarity"
      - "FAISS tidak thread-safe untuk concurrent write, jangan add() dari multiple threads secara bersamaan"
      - "indices[0] bisa berisi -1 jika top_k > jumlah vectors di index, selalu filter idx != -1"
      - "faiss-gpu jauh lebih cepat tapi butuh CUDA setup yang kompleks, gunakan faiss-cpu untuk RETRO"

  - id: pgvector
    name: "pgvector"
    category: "Vector Extension for PostgreSQL"
    description: >
      pgvector adalah extension PostgreSQL open-source yang menambahkan tipe data
      vector dan operator similarity search langsung di dalam PostgreSQL. Memungkinkan
      menyimpan dan mencari embeddings di database yang sama dengan data relasional
      lainnya tanpa server vector DB terpisah. Mendukung exact (IVFFlat) dan
      approximate (HNSW) nearest neighbor search. Sangat cocok untuk RETRO jika
      ingin menyederhanakan infrastruktur: satu PostgreSQL instance untuk semua data.
    specific_function: >
      Menyimpan company profile embeddings langsung di PostgreSQL bersama dengan
      data relasional (URL, metadata, staging data). Memungkinkan JOIN antara
      company profiles dan data lain dalam satu SQL query.
    language: "Python (psycopg2, asyncpg, sqlalchemy, pgvector-python)"
    pricing: "Free (open-source extension)"
    last_updated: "2025"
    url: "https://github.com/pgvector/pgvector"
    retro:
      phase: "Phase 4 (Vector Storage) - Single-DB alternatif"
      role: >
        Digunakan jika RETRO ingin mengurangi jumlah services yang perlu dijalankan.
        Dengan pgvector, satu PostgreSQL menangani semua: staging data, company profiles,
        relational queries, DAN vector similarity search. Mengorbankan sedikit performance
        dibanding Qdrant tapi menyederhanakan infrastruktur.
      when_to_use: >
        Pertimbangkan pgvector jika budget server terbatas (tidak mau bayar untuk
        Qdrant Cloud dan tidak mau setup Docker dua container). Jika company pool
        < 10.000, pgvector sudah sangat memadai. Untuk > 100.000 perusahaan,
        pertimbangkan HNSW index atau migrasi ke Qdrant.
      priority: "secondary (single-DB architecture)"
      output_goes_to: "Synthesis Agent via SQL query"
    setup:
      install: |
        pip install pgvector psycopg2-binary
        # Di PostgreSQL server:
        # CREATE EXTENSION vector;
      docker: "docker run -e POSTGRES_PASSWORD=retro -p 5432:5432 pgvector/pgvector:pg16"
      requirements:
        - "PostgreSQL 14+ dengan pgvector extension"
        - "pgvector>=0.2.0"
        - "psycopg2-binary atau asyncpg"
      env_vars:
        - name: DATABASE_URL
          description: "postgresql://user:password@host:5432/retro_db"
    usage:
      basic_example: |
        import psycopg2
        from pgvector.psycopg2 import register_vector

        conn = psycopg2.connect("postgresql://retro:retro@localhost/retro_db")
        register_vector(conn)  # Register tipe vector

        cur = conn.cursor()

        # Buat tabel dengan kolom vector
        cur.execute("""
            CREATE TABLE IF NOT EXISTS companies (
                id          SERIAL PRIMARY KEY,
                name        TEXT,
                domain      TEXT UNIQUE,
                embedding   vector(384)
            )
        """)

        # Insert dengan embedding
        import numpy as np
        vec = np.random.rand(384).astype(np.float32)
        cur.execute(
            "INSERT INTO companies (name, domain, embedding) VALUES (%s, %s, %s)",
            ("PT Maju", "maju.co.id", vec)
        )
        conn.commit()

        # Similarity search (cosine distance = 1 - cosine_similarity)
        query_vec = np.random.rand(384).astype(np.float32)
        cur.execute("""
            SELECT name, domain, 1 - (embedding <=> %s::vector) AS similarity
            FROM companies
            ORDER BY embedding <=> %s::vector
            LIMIT 5
        """, (query_vec, query_vec))

        for row in cur.fetchall():
            print(f"[{row[2]:.4f}] {row[0]} | {row[1]}")

      retro_example: |
        import psycopg2
        import numpy as np
        from pgvector.psycopg2 import register_vector
        from sentence_transformers import SentenceTransformer

        _conn = None
        _embedder = None

        def get_conn():
            global _conn
            if _conn is None or _conn.closed:
                _conn = psycopg2.connect("postgresql://retro:retro@localhost/retro_db")
                register_vector(_conn)
                _ensure_schema(_conn)
            return _conn

        def _ensure_schema(conn):
            cur = conn.cursor()
            cur.execute("CREATE EXTENSION IF NOT EXISTS vector")
            cur.execute("""
                CREATE TABLE IF NOT EXISTS company_vectors (
                    id              SERIAL PRIMARY KEY,
                    company_name    TEXT NOT NULL,
                    domain          TEXT UNIQUE NOT NULL,
                    industry        TEXT,
                    country         TEXT,
                    expo            TEXT,
                    profile_card    JSONB,
                    embedding       vector(384),
                    created_at      TIMESTAMPTZ DEFAULT NOW()
                )
            """)
            # HNSW index untuk approximate search yang lebih cepat
            cur.execute("""
                CREATE INDEX IF NOT EXISTS company_vectors_hnsw_idx
                ON company_vectors
                USING hnsw (embedding vector_cosine_ops)
                WITH (m = 16, ef_construction = 64)
            """)
            conn.commit()

        def upsert_company_pgvector(profile_card: dict, expo: str):
            embedder = get_embedder()
            conn = get_conn()
            cur  = conn.cursor()

            text = (
                f"{profile_card['company_name']} "
                f"{profile_card.get('industry', '')} "
                f"{profile_card.get('products_services', '')} "
                f"{profile_card.get('value_proposition', '')}"
            )
            vec = embedder.encode(text, normalize_embeddings=True).astype(np.float32)

            import json
            cur.execute("""
                INSERT INTO company_vectors
                    (company_name, domain, industry, country, expo, profile_card, embedding)
                VALUES (%s, %s, %s, %s, %s, %s, %s)
                ON CONFLICT (domain) DO UPDATE SET
                    embedding    = EXCLUDED.embedding,
                    profile_card = EXCLUDED.profile_card,
                    expo         = EXCLUDED.expo
            """, (
                profile_card["company_name"],
                profile_card["domain"],
                profile_card.get("industry"),
                profile_card.get("country"),
                expo,
                json.dumps(profile_card),
                vec,
            ))
            conn.commit()

        def search_pgvector(retro_text: str, top_k: int = 20, expo: str | None = None):
            embedder = get_embedder()
            conn = get_conn()
            cur  = conn.cursor()

            query_vec = embedder.encode(retro_text, normalize_embeddings=True).astype(np.float32)

            where_clause = "WHERE expo = %s" if expo else ""
            params = [query_vec, query_vec]
            if expo:
                params = [query_vec, expo, query_vec]

            sql = f"""
                SELECT
                    company_name,
                    domain,
                    industry,
                    1 - (embedding <=> %s::vector) AS similarity,
                    profile_card
                FROM company_vectors
                {where_clause}
                ORDER BY embedding <=> %s::vector
                LIMIT {top_k}
            """
            if expo:
                cur.execute(sql, (query_vec, expo, query_vec))
            else:
                cur.execute(sql, (query_vec, query_vec))

            rows = cur.fetchall()
            return [
                {
                    "company_name":     r[0],
                    "domain":           r[1],
                    "industry":         r[2],
                    "similarity_score": round(float(r[3]), 4),
                    "profile_card":     r[4],
                }
                for r in rows
            ]

        def get_embedder():
            global _embedder
            if _embedder is None:
                _embedder = SentenceTransformer("all-MiniLM-L6-v2")
            return _embedder

      expected_output: |
        # Query result dari PostgreSQL:
        [0.8821] PT Sinar Logistik Nusantara | sinarlogistik.co.id | logistics
        [0.8345] Global Supply Chain Solutions | gsc-solutions.com  | technology
        [0.7912] Nexus Distribution Hub       | nexusdist.sg        | logistics

    notes:
      - "Operator <=> adalah cosine distance (1 - similarity), <#> adalah inner product, <-> adalah euclidean"
      - "HNSW index jauh lebih cepat dari IVFFlat untuk query, tapi lebih lambat saat build dan butuh lebih banyak RAM"
      - "ON CONFLICT (domain) DO UPDATE memungkinkan upsert yang idempotent, aman dipanggil berkali-kali"
      - "JSONB untuk profile_card memungkinkan query JSON langsung dari PostgreSQL: profile_card->>'company_name'"
      - "pgvector Docker image pgvector/pgvector sudah include extension, tidak perlu install manual"
    pitfalls:
      - "JANGAN lupa jalankan CREATE EXTENSION IF NOT EXISTS vector; sebelum membuat tabel dengan kolom vector"
      - "Vector dimension harus konsisten, tidak bisa ubah setelah tabel dibuat tanpa DROP dan CREATE ulang"
      - "Tanpa HNSW atau IVFFlat index, pgvector melakukan sequential scan (lambat untuk > 10K rows)"
      - "pgvector menyimpan embeddings sebagai float32, pastikan numpy array di-cast ke float32 sebelum insert"

  - id: milvus
    name: "Milvus"
    category: "Vector Database"
    description: >
      Milvus adalah vector database open-source cloud-native yang dirancang untuk
      skala besar (billion-scale vectors). Mendukung multiple index types (IVF_FLAT,
