  - id: wikidata_sparql
    name: "Wikidata SPARQL (Company Facts)"
    category: "Open Knowledge Graph"
    description: >
      Wikidata adalah knowledge base yang bisa di-query dengan SPARQL. Berisi informasi
      terstruktur tentang perusahaan: founding date, headquarters, CEO, parent company,
      subsidiaries, industry classification (Freebase/Wikidata IDs), dan stock ticker.
      Gratis, tidak butuh autentikasi. Berguna untuk mendapatkan structured facts
      tentang companies yang cukup prominent untuk memiliki Wikidata entry.
    specific_function: >
      Structured company facts dari Wikidata. Berguna untuk companies dengan Wikipedia
      entry: founding date verified, headquarters country, parent company, industry
      classification. Memperkaya Company Profile dengan verified facts.
    language: "Python (requests, SPARQLWrapper)"
    pricing: "Gratis"
    last_updated: "2025"
    url: "https://query.wikidata.org"
    retro:
      phase: "Phase 3 (Company Profiling) - Structured facts"
      role: "Structured company facts untuk prominent companies dengan Wikipedia entry"
      when_to_use: >
        Gunakan untuk large/prominent companies. UKM dan startup kecil sangat jarang
        punya Wikidata entry.
      priority: "optional (prominent companies)"
      output_goes_to: "Company Profile Card enrichment"
    setup:
      install: "pip install SPARQLWrapper"
      requirements:
        - "SPARQLWrapper>=2.0.0"
      env_vars: []
    usage:
      basic_example: |
        from SPARQLWrapper import SPARQLWrapper, JSON

        sparql = SPARQLWrapper("https://query.wikidata.org/sparql")
        sparql.addCustomHttpHeader("User-Agent", "RETRO Pipeline/1.0 contact@retro.id")

        def query_company_wikidata(company_name: str) -> list[dict]:
            """Query Wikidata untuk informasi perusahaan."""
            query = f"""
            SELECT ?company ?companyLabel ?founded ?headquarters ?headLabel ?industry ?industryLabel WHERE {{
              ?company rdfs:label "{company_name}"@en .
              ?company wdt:P571 ?founded . OPTIONAL {{ ?company wdt:P159 ?headquarters . }}
              OPTIONAL {{ ?company wdt:P452 ?industry . }}
              SERVICE wikibase:label {{ bd:serviceParam wikibase:language "[AUTO_LANGUAGE],en". }}
            }}
            LIMIT 5
            """
            sparql.setQuery(query)
            sparql.setReturnFormat(JSON)
            results = sparql.query().convert()
            return results["results"]["bindings"]

        results = query_company_wikidata("Maersk")
        for r in results:
            print(r.get("companyLabel", {}).get("value"), r.get("founded", {}).get("value"))

      retro_example: |
        from SPARQLWrapper import SPARQLWrapper, JSON
        import time

        sparql = SPARQLWrapper("https://query.wikidata.org/sparql")
        sparql.addCustomHttpHeader("User-Agent", "RETRO Pipeline/1.0 contact@retro.id")

        def enrich_with_wikidata(company_name: str) -> dict:
            """Enrich company profile dengan Wikidata facts."""
            query = f"""
            SELECT ?companyLabel ?founded ?headquartersLabel ?parentLabel ?ceo ?ceoLabel WHERE {{
              ?company rdfs:label "{company_name}"@en ;
                       wdt:P31 wd:Q4830453 .
              OPTIONAL {{ ?company wdt:P571 ?founded . }}
              OPTIONAL {{ ?company wdt:P159 ?headquarters . }}
              OPTIONAL {{ ?company wdt:P749 ?parent . }}
              OPTIONAL {{ ?company wdt:P169 ?ceo . }}
              SERVICE wikibase:label {{ bd:serviceParam wikibase:language "en". }}
            }} LIMIT 1
            """
            try:
                time.sleep(1)
                sparql.setQuery(query)
                sparql.setReturnFormat(JSON)
                results = sparql.query().convert()
                bindings = results["results"]["bindings"]
                if not bindings:
                    return {}
                r = bindings[0]
                return {
                    "wikidata_name":   r.get("companyLabel", {}).get("value"),
                    "founded":         r.get("founded", {}).get("value", "")[:4],
                    "headquarters":    r.get("headquartersLabel", {}).get("value"),
                    "parent_company":  r.get("parentLabel", {}).get("value"),
                    "ceo":             r.get("ceoLabel", {}).get("value"),
                }
            except Exception:
                return {}

      expected_output: |
        {
          "wikidata_name":   "Maersk",
          "founded":         "1904",
          "headquarters":    "Copenhagen",
          "parent_company":  null,
          "ceo":             "Vincent Clerc"
        }

    notes:
      - "SPARQL endpoint Wikidata bisa lambat (2-10 detik per query), cache results"
      - "Wikidata label search case-sensitive, gunakan nama resmi perusahaan"
      - "Rate limit Wikidata: jangan kirim lebih dari 1 request/detik"
    pitfalls:
      - "Kebanyakan perusahaan kecil dan startup tidak ada di Wikidata, jangan expect 100% coverage"
      - "SPARQL query complex bisa timeout di Wikidata, sederhanakan jika timeout"

  - id: metagoofil_exiftool
    name: "Metagoofil & ExifTool (Metadata Extraction)"
    category: "Document Metadata OSINT"
    description: >
      Metagoofil adalah tool untuk mencari dan download public documents (PDF, DOCX,
      PPTX) dari domain target menggunakan Google search, kemudian mengekstrak metadata
      dari dokumen tersebut. ExifTool adalah tool universal untuk baca metadata dari
      berbagai format file: PDF author, MS Office last edited by, GPS coordinates
      di gambar, creation date, dan software used. Berguna untuk RETRO untuk
      menemukan nama karyawan perusahaan dari dokumen publik mereka.
    specific_function: >
      Extract nama karyawan perusahaan dari metadata dokumen publik (PDF brochures,
      PPTX presentations). PDF yang didownload dari expo website seringkali mengandung
      metadata: author name, company name, creator software. Data ini bisa digunakan
      untuk email discovery (nama + domain = possible email format).
    language: "Python (subprocess untuk ExifTool) + metagoofil CLI"
    pricing: "Free (open-source)"
    last_updated: "2025"
    url: "https://github.com/laramies/metagoofil"
    retro:
      phase: "Phase 3 (Company Profiling) - Document metadata OSINT"
      role: >
        Extract author names dan company info dari PDF metadata. Berguna untuk
        menemukan nama karyawan yang mungkin jadi kontak email.
      when_to_use: >
        Gunakan untuk companies yang sudah download brochure PDF-nya. Extract metadata
        PDF sebelum konten (metadata extraction cepat, konten extraction lambat).
      priority: "optional (metadata enrichment)"
      output_goes_to: "Email discovery pipeline (nama untuk email pattern guessing)"
    setup:
      install: |
        pip install pyexiftool
        # Install ExifTool binary:
        # Linux: sudo apt-get install exiftool
        # macOS: brew install exiftool
        # Windows: Download dari https://exiftool.org/
      requirements:
        - "pyexiftool>=0.5.0"
        - "ExifTool binary installed di system"
      env_vars: []
    usage:
      basic_example: |
        import exiftool
        import json

        def extract_pdf_metadata(pdf_path: str) -> dict:
            """Extract metadata dari PDF file."""
            with exiftool.ExifToolHelper() as et:
                metadata = et.get_metadata(pdf_path)
                if metadata:
                    m = metadata[0]
                    return {
                        "author":   m.get("XMP:Creator") or m.get("PDF:Author"),
                        "creator":  m.get("PDF:Creator"),
                        "producer": m.get("PDF:Producer"),
                        "subject":  m.get("PDF:Subject"),
                        "title":    m.get("PDF:Title"),
                        "created":  m.get("PDF:CreateDate"),
                        "company":  m.get("XMP:CreatorTool"),
                    }
            return {}

        meta = extract_pdf_metadata("/tmp/company_brochure.pdf")
        print(meta)

      retro_example: |
        import exiftool
        import os
        import re

        def extract_pdf_author_for_email(pdf_path: str, domain: str) -> dict | None:
            """
            Extract PDF author name untuk email pattern guessing.
            Jika PDF author = "Budi Santoso", email candidates:
            - budi.santoso@domain.com
            - b.santoso@domain.com
            - budi@domain.com
            """
            try:
                with exiftool.ExifToolHelper() as et:
                    meta = et.get_metadata(pdf_path)
                    if not meta:
                        return None
                    m = meta[0]
                    author_raw = (
                        m.get("XMP:Creator") or
                        m.get("PDF:Author") or
                        m.get("XMP:Description") or
                        ""
                    )

                    if not author_raw:
                        return None

                    # Clean author string
                    author = author_raw.strip()
                    parts  = author.split()

                    if len(parts) >= 2:
                        first = parts[0].lower()
                        last  = parts[-1].lower()
                        email_patterns = [
                            f"{first}.{last}@{domain}",
                            f"{first[0]}.{last}@{domain}",
                            f"{first}@{domain}",
                        ]
                        return {
                            "author_name":    author,
                            "email_patterns": email_patterns,
                        }
            except Exception:
                pass
            return None

        def extract_bulk_metadata(pdf_paths: list[str]) -> list[dict]:
            """Batch extract metadata dari multiple PDFs secara efisien."""
            try:
                with exiftool.ExifToolHelper() as et:
                    all_meta = et.get_metadata(pdf_paths)
                    results  = []
                    for m in all_meta:
                        results.append({
                            "file":    m.get("SourceFile"),
                            "author":  m.get("XMP:Creator") or m.get("PDF:Author"),
                            "company": m.get("XMP:Company"),
                            "title":   m.get("PDF:Title"),
                        })
                    return results
            except Exception:
                return []

      expected_output: |
        {
          "author_name":    "Budi Santoso",
          "email_patterns": [
            "budi.santoso@sinarlogistik.co.id",
            "b.santoso@sinarlogistik.co.id",
            "budi@sinarlogistik.co.id"
          ]
        }
        # Email patterns ini kemudian divalidasi dengan email-validator (09_email_discovery.yaml)

    notes:
      - "ExifTool batch mode (multiple files sekaligus) jauh lebih efisien dari per-file calls"
      - "PDF metadata author sering berisi nama creator dokumen, tidak selalu nama kontak"
      - "Gunakan kombinasi: PDF author name + domain + email pattern guessing + email validator"
      - "JANGAN gunakan data dari dokumen confidential/private yang tidak dimaksudkan untuk publik"
    pitfalls:
      - "Banyak PDF modern tidak punya author metadata (digenerate dari web form, tidak dari Word)"
      - "Author metadata bisa berisi nama software ('Adobe Acrobat') bukan nama orang"
      - "ExifTool binary harus terinstall di sistem, tidak hanya pip install pyexiftool"

  - id: spiderfoot_bbot
    name: "SpiderFoot & BBOT (Automated OSINT Frameworks)"
    category: "Automated OSINT Frameworks"
    description: >
      SpiderFoot adalah framework OSINT open-source yang mengotomasi pengumpulan
      data dari ratusan sources untuk satu target (domain atau IP). BBOT (Bug Bounty
      Orchestration Tool) adalah modern alternative SpiderFoot yang lebih cepat dan
      modular. Keduanya bisa digunakan untuk comprehensive OSINT collection: email,
      employees, social media, tech stack, subdomains, cloud assets. Untuk RETRO,
      berguna untuk deep profiling top-priority targets sebelum mengirim proposal.
    specific_function: >
      Comprehensive automated OSINT untuk top priority companies. Jalankan SpiderFoot
      atau BBOT untuk mendapatkan semua informasi publik tentang company target:
      emails, employees, social profiles, tech stack, subdomains dalam satu scan.
    language: "Python (CLI + Python API)"
    pricing: "Free (open-source)"
    last_updated: "2025"
    url: "https://www.spiderfoot.net"
    retro:
      phase: "Phase 3 (Company Profiling) - Deep OSINT untuk top targets"
      role: >
        Automated comprehensive OSINT untuk top-priority companies. Dijalankan
        setelah Synthesis Agent memilih top 5-10 candidates untuk deep profiling
        sebelum proposal dikirim.
      when_to_use: >
        Gunakan SpiderFoot/BBOT hanya untuk top priority candidates (collaboration_potential=high
        + Synthesis Agent top-ranked). Terlalu berat untuk semua companies.
      priority: "optional (deep OSINT)"
      output_goes_to: "Enriched company profile"
    setup:
      install: |
        # SpiderFoot
        pip install spiderfoot
        # atau: docker pull spiderfoot/spiderfoot

        # BBOT (modern alternative, lebih aktif dikembangkan)
        pip install bbot
      requirements:
        - "spiderfoot>=4.0 atau bbot>=2.0"
        - "API keys untuk enrichment modules (VirusTotal, Shodan, Hunter, dll)"
      env_vars: []
    usage:
      basic_example: |
        # SpiderFoot via CLI
        # python sf.py -s "sinarlogistik.co.id" -t INTERNET_NAME -m all -q -o table

        # BBOT via CLI (lebih modern)
        # bbot -t sinarlogistik.co.id -f safe -o /tmp/bbot_results

        # Python API SpiderFoot
        import subprocess
        import json
        import os

        def run_spiderfoot(target: str, output_dir: str = "/tmp/sf_output") -> dict:
            """Run SpiderFoot OSINT scan untuk target domain."""
            os.makedirs(output_dir, exist_ok=True)
            result = subprocess.run(
                [
                    "python",
                    "sf.py",
                    "-s", target,
                    "-t", "INTERNET_NAME",
                    "-m", "sfp_emailcrawlr,sfp_hunter,sfp_shodan",
                    "-q",
                    "-o", "json",
                    "-F", "EMAILADDR,PHONE_NUMBER,SOCIAL_MEDIA",
                ],
                capture_output=True,
                text=True,
                timeout=300,
            )
            try:
                return json.loads(result.stdout)
            except json.JSONDecodeError:
                return {}

      retro_example: |
        import subprocess
        import json
        import os

        def run_bbot_scan(target_domain: str, timeout_seconds: int = 300) -> dict:
            """
            Run BBOT OSINT scan untuk deep profiling.
            Gunakan hanya untuk top-priority targets.
            """
            output_dir = f"/tmp/bbot_{target_domain.replace('.', '_')}"

            result = subprocess.run(
                [
                    "bbot",
                    "-t", target_domain,
                    "-f", "safe",      # Hanya modules yang aman (tidak aggressive)
                    "--ignore-failed-deps",
                    "-o", output_dir,
                    "--json",
                ],
                capture_output=True,
                text=True,
                timeout=timeout_seconds,
            )

            # Parse JSON events dari BBOT output
            emails = set()
            subdomains = set()

            output_json = os.path.join(output_dir, f"{target_domain}.json")
            if os.path.exists(output_json):
                with open(output_json) as f:
                    for line in f:
                        try:
                            event = json.loads(line)
                            if event.get("type") == "EMAIL_ADDRESS":
                                emails.add(event["data"])
                            elif event.get("type") == "DNS_NAME":
                                subdomains.add(event["data"])
                        except json.JSONDecodeError:
                            continue

            return {
                "target":     target_domain,
                "emails":     list(emails),
                "subdomains": list(subdomains),
                "scan_dir":   output_dir,
            }

      expected_output: |
        BBOT scan for sinarlogistik.co.id (completed in 4m 32s):
        {
          "target": "sinarlogistik.co.id",
          "emails": [
            "budi.santoso@sinarlogistik.co.id",
            "info@sinarlogistik.co.id",
            "hr@sinarlogistik.co.id"
          ],
          "subdomains": [
            "api.sinarlogistik.co.id",
            "dashboard.sinarlogistik.co.id",
            "mail.sinarlogistik.co.id"
          ]
        }

    notes:
      - "BBOT lebih aktif dikembangkan dan lebih modular dari SpiderFoot, prefer BBOT untuk project baru"
      - "-f safe flag di BBOT hanya jalankan passive/non-intrusive modules (tidak ada port scanning, dll)"
      - "Scan bisa lambat (5-30 menit per target tergantung modules yang aktif)"
      - "Gunakan hanya untuk top 5-10 priority targets untuk conserve resources"
    pitfalls:
      - "JANGAN jalankan aggressive modules (port scanning, brute force) tanpa izin explicit"
      - "BBOT dan SpiderFoot bisa generate traffic yang cukup besar ke target, bisa di-detect"
      - "JANGAN run parallel scans untuk banyak targets sekaligus, bisa block IP"
