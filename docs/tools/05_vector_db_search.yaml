        print(results)

      retro_example: |
        # Milvus Lite untuk development, mudah switch ke Standalone untuk production
        from pymilvus import MilvusClient, DataType
        from sentence_transformers import SentenceTransformer
        import numpy as np

        def get_milvus_client(uri: str = "./retro_milvus.db") -> MilvusClient:
            client = MilvusClient(uri)
            if "retro_companies" not in client.list_collections():
                schema = client.create_schema(auto_id=False, enable_dynamic_field=True)
                schema.add_field("id",        DataType.VARCHAR, max_length=200, is_primary=True)
                schema.add_field("embedding", DataType.FLOAT_VECTOR, dim=384)

                index_params = client.prepare_index_params()
                index_params.add_index("embedding", metric_type="COSINE", index_type="HNSW")

                client.create_collection("retro_companies", schema=schema, index_params=index_params)
            return client

        def upsert_company_milvus(client: MilvusClient, profile_card: dict, expo: str, embedder):
            text = f"{profile_card['company_name']} {profile_card.get('industry', '')} {profile_card.get('value_proposition', '')}"
            vec  = embedder.encode(text, normalize_embeddings=True).tolist()
            doc_id = profile_card["domain"].replace(".", "-")[:200]

            client.upsert(
                collection_name="retro_companies",
                data=[{
                    "id":           doc_id,
                    "embedding":    vec,
                    "company_name": profile_card["company_name"],
                    "domain":       profile_card["domain"],
                    "industry":     profile_card.get("industry", ""),
                    "expo":         expo,
                }]
            )

        def search_milvus(client: MilvusClient, retro_text: str, embedder, top_k: int = 20):
            query_vec = embedder.encode(retro_text, normalize_embeddings=True).tolist()
            results = client.search(
                collection_name="retro_companies",
                data=[query_vec],
                limit=top_k,
                output_fields=["company_name", "domain", "industry"],
            )
            return [
                {
                    "similarity_score": r["distance"],
                    "company_name":     r["entity"]["company_name"],
                    "domain":           r["entity"]["domain"],
                }
                for r in results[0]
            ]

      expected_output: |
        [0.8821] PT Sinar Logistik | sinarlogistik.co.id
        [0.8345] Global SCM Tech   | globalscm.io

    notes:
      - "Milvus Lite (file URI) cocok untuk development, tidak perlu Docker apapun"
      - "Untuk production, switch ke Milvus Standalone Docker atau Zilliz Cloud hanya dengan mengubah URI"
      - "Dynamic fields (enable_dynamic_field=True) memungkinkan insert field arbitrary tanpa define schema dulu"
      - "Milvus mendukung partition untuk multi-tenancy: bisa partition per expo atau per industri"
    pitfalls:
      - "Milvus Lite tidak support semua fitur Milvus Standalone, cek dokumentasi sebelum menggunakan fitur advanced"
      - "String ID di Milvus memiliki max_length, pastikan domain-based ID tidak melebihi limit"
      - "COSINE metric memerlukan HNSW atau IVF index, tidak bisa dengan FLAT index"

  - id: annoy
    name: "Annoy (Approximate Nearest Neighbors Oh Yeah)"
    category: "Vector Search Library"
    description: >
      Annoy adalah library C++ dengan Python binding dari Spotify untuk approximate
      nearest neighbor search. Menggunakan random projection trees sebagai indexing
      structure. Sangat ringan, tidak ada server, index disimpan sebagai memory-mapped
      file (bisa dibagi antar proses). Cocok untuk static datasets yang jarang berubah.
      Setelah index di-build, tidak bisa di-update (harus rebuild dari scratch).
    specific_function: >
      Static similarity search untuk company pool yang sudah fix (misalnya setelah
      semua exhibitor satu expo selesai di-profile). Build index satu kali, query
      berkali-kali. Lebih cepat dari FAISS untuk query tunggal karena memory-mapped.
    language: "Python (annoy)"
    pricing: "Free (open-source, Spotify)"
    last_updated: "2024"
    url: "https://github.com/spotify/annoy"
    retro:
      phase: "Phase 5 (Synthesis) - Static index untuk satu expo"
      role: >
        Setelah semua perusahaan dari satu expo selesai di-profile, build Annoy
        index untuk expo tersebut. Index ini bisa di-load berkali-kali oleh
        Synthesis Agent tanpa re-compute. Ideal untuk periodic batch synthesis
        (misal: setiap malam setelah crawling selesai).
      when_to_use: >
        Gunakan Annoy ketika company pool untuk satu expo sudah stabil dan tidak
        akan berubah dalam satu malam. Build index malam hari, query pagi hari.
        Jangan gunakan jika company profiles sering diupdate secara real-time.
      priority: "optional (static batch mode)"
      output_goes_to: "Synthesis Agent (static expo index)"
    setup:
      install: "pip install annoy"
      requirements:
        - "annoy>=1.17.0"
        - "numpy"
        - "sentence-transformers"
      env_vars: []
    usage:
      basic_example: |
        from annoy import AnnoyIndex

        dim = 384
        index = AnnoyIndex(dim, 'angular')  # 'angular' = cosine similarity

        # Build index
        index.add_item(0, [0.1, 0.2, ...])  # item ID, vector
        index.add_item(1, [0.3, 0.4, ...])
        index.build(n_trees=10)  # Lebih banyak trees = lebih akurat tapi lebih lambat build

        # Save dan load
        index.save('companies.ann')
        new_index = AnnoyIndex(dim, 'angular')
        new_index.load('companies.ann')

        # Query
        similar_ids, distances = new_index.get_nns_by_vector(
            [0.15, 0.25, ...],
            n=5,
            include_distances=True
        )
        print(similar_ids, distances)

      retro_example: |
        import json
        import os
        from annoy import AnnoyIndex
        from sentence_transformers import SentenceTransformer

        DIM = 384
        MODEL_NAME = "all-MiniLM-L6-v2"

        def build_expo_annoy_index(
            profiles: list[dict],
            expo_name: str,
            index_dir: str = "./annoy_indexes",
            n_trees: int = 20,
        ) -> tuple[AnnoyIndex, list[dict]]:
            """
            Build Annoy index untuk satu expo. Simpan ke disk untuk reuse.
            Return: (AnnoyIndex, list of profiles in index order)
            """
            os.makedirs(index_dir, exist_ok=True)
            index_path    = os.path.join(index_dir, f"{expo_name.replace(' ', '_')}.ann")
            metadata_path = os.path.join(index_dir, f"{expo_name.replace(' ', '_')}_meta.json")

            embedder = SentenceTransformer(MODEL_NAME)
            index    = AnnoyIndex(DIM, 'angular')

            texts = [
                f"{p.get('company_name', '')} {p.get('industry', '')} {p.get('value_proposition', '')}"
                for p in profiles
            ]
            embeddings = embedder.encode(texts, normalize_embeddings=True, batch_size=64)

            for i, vec in enumerate(embeddings):
                index.add_item(i, vec.tolist())

            index.build(n_trees=n_trees)
            index.save(index_path)

            with open(metadata_path, 'w') as f:
                json.dump(profiles, f, ensure_ascii=False)

            print(f"[Annoy] Built index for {expo_name}: {len(profiles)} companies, {n_trees} trees")
            return index, profiles

        def load_expo_index(expo_name: str, index_dir: str = "./annoy_indexes"):
            index_path    = os.path.join(index_dir, f"{expo_name.replace(' ', '_')}.ann")
            metadata_path = os.path.join(index_dir, f"{expo_name.replace(' ', '_')}_meta.json")

            index = AnnoyIndex(DIM, 'angular')
            index.load(index_path)

            with open(metadata_path) as f:
                profiles = json.load(f)

            return index, profiles

        def search_annoy(expo_name: str, retro_text: str, top_k: int = 20):
            embedder = SentenceTransformer(MODEL_NAME)
            index, profiles = load_expo_index(expo_name)

            query_vec = embedder.encode(retro_text, normalize_embeddings=True).tolist()
            ids, distances = index.get_nns_by_vector(query_vec, n=top_k, include_distances=True)

            results = []
            for idx, dist in zip(ids, distances):
                similarity = 1 - (dist ** 2) / 2  # Convert angular distance ke cosine similarity
                results.append({
                    "similarity_score": round(similarity, 4),
                    "company_name":     profiles[idx]["company_name"],
                    "domain":           profiles[idx]["domain"],
                })
            return results

      expected_output: |
        [Annoy] Built index for LogiSEA 2025: 342 companies, 20 trees
        Saved to ./annoy_indexes/LogiSEA_2025.ann

        Search results for expo LogiSEA 2025:
        [0.8921] PT Sinar Logistik Nusantara | sinarlogistik.co.id
        [0.8534] Global SCM Tech             | globalscm.io
        [0.8102] Nexus Distribution          | nexusdist.sg

    notes:
      - "Angular distance di Annoy bisa dikonversi ke cosine similarity: cosine = 1 - (angular^2 / 2)"
      - "Annoy index immutable setelah build, tidak bisa add_item setelah build(). Harus rebuild dari scratch jika ada company baru"
      - "Memory-mapped file: multiple Python processes bisa load AnnoyIndex yang sama tanpa duplikasi RAM"
      - "n_trees lebih banyak = search lebih akurat, build lebih lambat. n_trees=20 sudah sangat baik untuk < 10K items"
      - "Annoy file .ann lebih compact dari pickle numpy array karena menggunakan binary format"
    pitfalls:
      - "JANGAN call build() dua kali pada index yang sama, gunakan new AnnoyIndex"
      - "Item ID di Annoy harus integer 0-based, tidak support string ID. Simpan mapping ID -> profile di metadata JSON terpisah"
      - "Annoy tidak support batch deletion, untuk remove company harus rebuild seluruh index"

  - id: usearch
    name: "USearch"
    category: "Vector Search Library"
    description: >
      USearch adalah vector search library dari Unum Cloud yang mengklaim sebagai
      alternatif FAISS yang lebih cepat dan lebih memory-efficient. Ditulis dalam
      C++ dengan Python binding. Mendukung HNSW indexing, multiple distance metrics,
      dan filtering. Relatif baru dibanding FAISS tapi semakin populer karena
      performa tinggi pada commodity hardware.
    specific_function: >
      Alternative ke FAISS untuk in-memory atau file-based vector search di RETRO.
      Lebih cepat dari FAISS untuk single query dan memiliki API yang lebih modern
      (support numpy array langsung tanpa manual normalize).
    language: "Python (usearch)"
    pricing: "Free (open-source, Apache 2.0)"
    last_updated: "2025"
    url: "https://github.com/unum-cloud/usearch"
    retro:
      phase: "Phase 5 (Synthesis) - Fallback / High-performance offline batch"
      role: >
        Fallback kedua setelah FAISS jika performa FAISS tidak mencukupi.
        Juga berguna untuk single-file deployment di edge device (seluruh index
        dalam satu file .usearch).
      when_to_use: >
        Pertimbangkan USearch jika FAISS terlalu lambat atau terlalu banyak memory.
        Untuk RETRO MVP, FAISS atau Qdrant sudah cukup.
      priority: "optional"
      output_goes_to: "Synthesis Agent"
    setup:
      install: "pip install usearch"
      requirements:
        - "usearch>=2.9.0"
        - "numpy"
      env_vars: []
    usage:
      basic_example: |
        from usearch.index import Index
        import numpy as np

        index = Index(
            ndim=384,
            metric='cos',       # Cosine similarity
            dtype='f32',
            connectivity=16,    # HNSW M parameter
            expansion_add=128,  # HNSW ef_construction
        )

        # Add vectors
        vectors = np.random.rand(100, 384).astype(np.float32)
        labels  = np.arange(100)  # Integer labels
        index.add(labels, vectors)

        # Save dan load
        index.save('companies.usearch')
        index2 = Index.restore('companies.usearch')

        # Search
        query = np.random.rand(384).astype(np.float32)
        matches = index.search(query, 5)
        for m in matches:
            print(f"Label: {m.key}, Score: {m.distance:.4f}")

      retro_example: |
        from usearch.index import Index
        import numpy as np
        import json
        from sentence_transformers import SentenceTransformer

        def build_usearch_index(profiles: list[dict], output_path: str):
            embedder = SentenceTransformer("all-MiniLM-L6-v2")
            texts    = [
                f"{p.get('company_name', '')} {p.get('industry', '')} {p.get('value_proposition', '')}"
                for p in profiles
            ]
            embeddings = embedder.encode(texts, normalize_embeddings=True).astype(np.float32)
            labels     = np.arange(len(profiles))

            index = Index(ndim=384, metric='cos')
            index.add(labels, embeddings)
            index.save(output_path)

            meta_path = output_path.replace('.usearch', '_meta.json')
            with open(meta_path, 'w') as f:
                json.dump(profiles, f, ensure_ascii=False)
            print(f"[USearch] Saved index: {len(profiles)} companies -> {output_path}")

        def search_usearch(index_path: str, retro_text: str, top_k: int = 20) -> list[dict]:
            embedder = SentenceTransformer("all-MiniLM-L6-v2")
            index    = Index.restore(index_path)
            meta_path = index_path.replace('.usearch', '_meta.json')
            with open(meta_path) as f:
                profiles = json.load(f)

            query_vec = embedder.encode(retro_text, normalize_embeddings=True).astype(np.float32)
            matches   = index.search(query_vec, top_k)

            return [
                {
                    "similarity_score": round(1 - float(m.distance), 4),
                    "company_name":     profiles[int(m.key)]["company_name"],
                    "domain":           profiles[int(m.key)]["domain"],
                }
                for m in matches
            ]

      expected_output: |
        [USearch] Saved index: 500 companies -> ./logisea2025.usearch
        [0.8921] PT Sinar Logistik | sinarlogistik.co.id
        [0.8534] Global SCM Tech   | globalscm.io

    notes:
      - "USearch metric='cos' menggunakan angular distance, konversi ke similarity: 1 - distance"
      - "USearch mendukung int8 quantization untuk mengurangi memory 4x: dtype='i8'"
      - "Save/restore jauh lebih cepat dari Annoy untuk index besar karena binary format yang lebih efisien"
    pitfalls:
      - "Labels harus numpy integer array (np.arange()), bukan Python list biasa"
      - "USearch cukup baru, API bisa berubah antar versi, pin versi di requirements.txt"

  - id: ollama_embedding
    name: "Ollama (Local Embedding)"
    category: "Local Embedding Provider"
    description: >
      Ollama adalah tool untuk menjalankan LLM dan embedding models secara lokal.
      Selain generasi teks, Ollama mendukung embedding generation via HTTP API yang
      kompatibel dengan OpenAI API format. Model embedding yang tersedia di Ollama:
      nomic-embed-text (768-dim), mxbai-embed-large (1024-dim), all-minilm (384-dim).
      Berguna ketika ingin generate embeddings tanpa internet atau tanpa API key.
    specific_function: >
      Alternative embedding provider untuk RETRO yang berjalan 100% lokal. Generate
      embeddings untuk company profiles tanpa mengirim data ke cloud. Cocok untuk
      data sensitif atau environment tanpa internet.
    language: "Python (via HTTP requests atau openai client)"
    pricing: "Free (lokal, butuh GPU/CPU)"
    last_updated: "2025"
    url: "https://ollama.com"
    retro:
      phase: "Phase 4 (Embedding Generation) - Local alternative"
      role: >
        Menghasilkan embeddings untuk company profiles secara lokal tanpa bergantung
        pada API eksternal. Digunakan ketika RETRO berjalan di environment tertutup
        atau ketika ingin zero-cost embeddings.
      when_to_use: >
        Gunakan Ollama embedding ketika data company profile bersifat confidential
        dan tidak boleh dikirim ke cloud. Atau ketika internet tidak tersedia.
        Untuk performa terbaik, Ollama membutuhkan GPU; di CPU akan lambat.
      priority: "secondary (local deployment)"
      output_goes_to: "Qdrant atau FAISS (embeddings siap disimpan)"
    setup:
      install: |
        # 1. Install Ollama dari https://ollama.com/download
        # 2. Pull model embedding
        ollama pull nomic-embed-text
        # 3. Install Python client
        pip install ollama
      requirements:
        - "Ollama Desktop atau CLI terinstall"
        - "Model embedding sudah di-pull"
        - "ollama Python package"
      env_vars:
        - name: OLLAMA_BASE_URL
          description: "URL Ollama server, default http://localhost:11434"
    usage:
      basic_example: |
        import ollama

        # Generate embedding untuk satu teks
        response = ollama.embeddings(
            model='nomic-embed-text',
            prompt='PT Maju Bersama adalah perusahaan logistik di Jakarta',
        )
        embedding = response['embedding']
        print(f"Embedding dim: {len(embedding)}")  # 768 untuk nomic-embed-text

        # Via openai-compatible API
        from openai import OpenAI
        client = OpenAI(base_url="http://localhost:11434/v1", api_key="ollama")
        resp = client.embeddings.create(
            model="nomic-embed-text",
            input="company description text",
        )
        vec = resp.data[0].embedding

      retro_example: |
        import ollama
        import numpy as np

        OLLAMA_EMBED_MODEL = "nomic-embed-text"  # 768-dim, free, local

        _ollama_available = None

        def check_ollama() -> bool:
            global _ollama_available
            if _ollama_available is None:
                try:
                    ollama.list()
                    _ollama_available = True
                except Exception:
                    _ollama_available = False
                    print("[Ollama] Ollama tidak berjalan, fallback ke sentence-transformers")
            return _ollama_available

        def embed_text_ollama(text: str) -> list[float] | None:
            """Return embedding atau None jika Ollama tidak tersedia."""
            if not check_ollama():
                return None
            response = ollama.embeddings(model=OLLAMA_EMBED_MODEL, prompt=text)
            vec = np.array(response['embedding'], dtype=np.float32)
            norm = np.linalg.norm(vec)
            if norm > 0:
                vec = vec / norm  # Manual normalize untuk cosine similarity
            return vec.tolist()

        def embed_company_profile(profile_card: dict) -> list[float]:
            """
            Embed company profile, coba Ollama dulu, fallback ke sentence-transformers.
            """
            text = (
                f"{profile_card.get('company_name', '')} "
                f"{profile_card.get('industry', '')} "
                f"{profile_card.get('products_services', '')} "
                f"{profile_card.get('value_proposition', '')}"
            )

            vec = embed_text_ollama(text)
            if vec is not None:
                return vec

            # Fallback ke sentence-transformers
            from sentence_transformers import SentenceTransformer
            model = SentenceTransformer("all-MiniLM-L6-v2")
            return model.encode(text, normalize_embeddings=True).tolist()

      expected_output: |
        Embedding dim: 768
        Vector (first 5 dims): [0.0234, -0.1123, 0.3412, -0.0567, 0.2891]

    notes:
      - "nomic-embed-text menghasilkan 768-dim embeddings, cocok untuk similarity search yang akurat"
      - "Ollama embedding jauh lebih lambat dari sentence-transformers untuk batch processing (tidak ada GPU batching)"
      - "Normalize manual diperlukan karena Ollama tidak otomatis normalize seperti sentence-transformers dengan normalize_embeddings=True"
      - "Ollama mendukung concurrent requests, bisa jalankan beberapa embedding request bersamaan dengan asyncio"
      - "all-minilm model di Ollama menghasilkan 384-dim, kompatibel dengan sentence-transformers all-MiniLM-L6-v2"
    pitfalls:
      - "Ollama harus running sebelum embed_text_ollama dipanggil, gunakan check_ollama() untuk graceful fallback"
      - "JANGAN gunakan Ollama untuk batch embedding besar (> 1000 texts) tanpa GPU, akan sangat lambat"
      - "Model harus sudah di-pull dengan ollama pull sebelum bisa digunakan"

  - id: litellm_embedding
    name: "LiteLLM (Embedding Interface)"
    category: "LLM Router / Unified API"
    description: >
      LiteLLM adalah library Python yang menyediakan unified interface untuk 100+
      LLM providers (OpenAI, Anthropic, Groq, Ollama, Azure, Cohere, dll) termasuk
      untuk embedding generation. Dengan LiteLLM, kode RETRO bisa switch antara
      OpenAI embeddings, Ollama embeddings, Cohere embeddings, atau Voyage AI embeddings
      hanya dengan mengubah satu string model name tanpa mengubah kode sama sekali.
    specific_function: >
      Unified embedding interface untuk RETRO. Synthesis Agent memanggil
      litellm.embedding() dengan model name yang dikonfigurasi di env, sehingga
      bisa switch provider embedding tanpa ubah kode. Mendukung async dengan
      litellm.aembedding() untuk batch processing.
    language: "Python"
    pricing: "Free (open-source router, biaya embedding tergantung provider)"
    last_updated: "2025"
    url: "https://litellm.ai"
    retro:
      phase: "Phase 4 (Embedding Generation) - Unified provider interface"
      role: >
        Single interface untuk semua embedding providers. RETRO menggunakan
        EMBED_MODEL env variable untuk pilih provider: 'ollama/nomic-embed-text'
        untuk lokal, 'text-embedding-3-small' untuk OpenAI, 'cohere/embed-multilingual-v3.0'
        untuk Cohere.
      when_to_use: >
        Gunakan LiteLLM embedding ketika RETRO perlu flexibility untuk ganti
        embedding provider berdasarkan cost/availability. Sangat berguna untuk
        A/B test kualitas embedding dari provider berbeda.
      priority: "secondary (provider flexibility)"
      output_goes_to: "Qdrant (embeddings dari any provider)"
    setup:
      install: "pip install litellm"
      requirements:
        - "litellm>=1.0.0"
        - "API key untuk provider yang dipilih (jika cloud)"
      env_vars:
        - name: EMBED_MODEL
          description: "Model embedding, e.g., 'text-embedding-3-small', 'ollama/nomic-embed-text'"
        - name: OPENAI_API_KEY
          description: "Diperlukan jika menggunakan OpenAI embeddings"
        - name: COHERE_API_KEY
          description: "Diperlukan jika menggunakan Cohere embeddings"
    usage:
      basic_example: |
        import litellm
        import os

        # OpenAI embeddings
        os.environ["OPENAI_API_KEY"] = "sk-..."
        response = litellm.embedding(
            model="text-embedding-3-small",
            input=["Company profile text here"],
        )
        vec = response.data[0]['embedding']
        print(f"Dimension: {len(vec)}")  # 1536 untuk text-embedding-3-small

        # Ollama embeddings (lokal, tidak perlu API key)
        response = litellm.embedding(
            model="ollama/nomic-embed-text",
            input=["Company profile text here"],
        )

        # Async (untuk batch)
        import asyncio
        async def embed_batch(texts: list[str]):
            tasks = [
                litellm.aembedding(model="text-embedding-3-small", input=[t])
                for t in texts
            ]
            results = await asyncio.gather(*tasks)
            return [r.data[0]['embedding'] for r in results]

      retro_example: |
        import litellm
        import numpy as np
        import asyncio
        import os

        EMBED_MODEL = os.getenv("EMBED_MODEL", "ollama/nomic-embed-text")

        async def embed_profiles_batch(profiles: list[dict]) -> list[list[float]]:
            """
            Embed semua company profiles secara async concurrent.
            Works dengan model apapun yang LiteLLM support.
            """
            texts = [
                (
                    f"{p.get('company_name', '')} "
                    f"{p.get('industry', '')} "
                    f"{p.get('products_services', '')} "
                    f"{p.get('value_proposition', '')}"
                )
                for p in profiles
            ]

            # Batch dengan semaphore untuk rate limiting
            semaphore = asyncio.Semaphore(5)  # Max 5 concurrent requests

            async def embed_one(text: str) -> list[float]:
                async with semaphore:
                    response = await litellm.aembedding(
                        model=EMBED_MODEL,
                        input=[text],
                    )
                    vec = np.array(response.data[0]['embedding'], dtype=np.float32)
                    norm = np.linalg.norm(vec)
                    if norm > 0:
                        vec = vec / norm
                    return vec.tolist()

            embeddings = await asyncio.gather(*[embed_one(t) for t in texts])
            return embeddings

        def embed_profile_sync(profile_card: dict) -> list[float]:
            """Synchronous wrapper untuk Context Agent yang tidak async."""
            text = (
                f"{profile_card.get('company_name', '')} "
                f"{profile_card.get('industry', '')} "
                f"{profile_card.get('value_proposition', '')}"
            )
            response = litellm.embedding(model=EMBED_MODEL, input=[text])
            vec = np.array(response.data[0]['embedding'], dtype=np.float32)
            norm = np.linalg.norm(vec)
            return (vec / norm if norm > 0 else vec).tolist()

        # Switch provider hanya dengan ganti env variable:
        # EMBED_MODEL=text-embedding-3-small              -> OpenAI (1536-dim, $0.02/1M tokens)
        # EMBED_MODEL=ollama/nomic-embed-text             -> Local Ollama (768-dim, gratis)
        # EMBED_MODEL=cohere/embed-multilingual-v3.0      -> Cohere (1024-dim, $0.10/1M tokens)
        # EMBED_MODEL=voyage/voyage-3                     -> Voyage AI (1024-dim, $0.06/1M tokens)

      expected_output: |
        # Menggunakan EMBED_MODEL=ollama/nomic-embed-text:
        Embedding dim: 768
        Normalize: True
        Provider: Ollama (local)

        # Menggunakan EMBED_MODEL=text-embedding-3-small:
        Embedding dim: 1536
        Normalize: True
        Provider: OpenAI

    notes:
      - "LiteLLM menggunakan OpenAI-compatible response format untuk semua providers, jadi response.data[0]['embedding'] selalu benar"
      - "Normalize manual TETAP diperlukan karena LiteLLM tidak selalu normalize output dari setiap provider"
      - "Dimension embedding berbeda per model, Qdrant collection harus dibuat dengan dimension yang sesuai"
      - "litellm.aembedding() mendukung true async, gunakan dengan asyncio.gather() untuk batch yang efisien"
      - "LiteLLM memiliki built-in retry, timeout, dan fallback logic yang bisa dikonfigurasi"
      - "Untuk switch provider, cukup ganti EMBED_MODEL env variable, tidak perlu ubah satu baris kode pun"
    pitfalls:
      - "JANGAN simpan embedding dari provider A ke Qdrant yang sudah berisi embedding dari provider B, dimensinya beda"
      - "Rate limit berbeda tiap provider, sesuaikan semaphore limit: OpenAI lebih longgar, Cohere lebih ketat"
      - "Ollama via LiteLLM lebih lambat dari direct ollama.embeddings() karena ada overhead routing"
      - "Cek EMBED_MODEL di awal startup dan validasi dimension match dengan Qdrant collection sebelum pipeline jalan"

  - id: weaviate
    name: "Weaviate"
    category: "Vector Database"
    description: >
      Weaviate adalah vector database open-source berbasis Go yang mendukung
      hybrid search (vector + BM25 keyword search secara bersamaan), GraphQL API,
      built-in vectorizer (otomatis embed dokumen saat insert tanpa kode Python
      tambahan), dan multi-tenancy. Tersedia sebagai Docker, Kubernetes, dan
      Weaviate Cloud (managed). Hybrid search sangat berguna untuk RETRO karena
      kombinasi semantic similarity dan keyword matching menghasilkan recall yang lebih baik.
    specific_function: >
      Hybrid vector + keyword search untuk RETRO. Ketika Synthesis Agent mencari
      perusahaan, bisa search berdasarkan semantic meaning DAN keyword spesifik
      secara bersamaan dalam satu query. Contoh: cari perusahaan yang secara
      semantik mirip RETRO AND mengandung kata "logistics" atau "supply chain".
    language: "Python (weaviate-client v4)"
    pricing: "Free (open-source), Weaviate Cloud: mulai $0 (sandbox 14 hari)"
    last_updated: "2025"
    url: "https://weaviate.io"
    retro:
      phase: "Phase 4 (Vector Storage) + Phase 5 (Hybrid Search)"
      role: >
        Alternative Qdrant dengan kemampuan hybrid search. Berguna ketika company
        pool besar dan pure semantic search sering mengembalikan hasil yang kurang
        precise. Hybrid search menggabungkan BM25 (keyword) dan HNSW (semantic).
      when_to_use: >
        Pertimbangkan Weaviate jika hasil Qdrant kurang precise karena terlalu
        banyak companies dengan profil generik. Hybrid search bisa narrow down
        hasil dengan filter keyword yang lebih ketat.
      priority: "optional (hybrid search use case)"
      output_goes_to: "Synthesis Agent (hybrid ranked results)"
    setup:
      install: "pip install weaviate-client"
      docker: "docker run -p 8080:8080 -p 50051:50051 cr.weaviate.io/semitechnologies/weaviate:latest"
      requirements:
        - "weaviate-client>=4.0.0"
        - "Docker untuk self-hosted"
      env_vars:
        - name: WEAVIATE_URL
          description: "URL Weaviate instance, default http://localhost:8080"
        - name: WEAVIATE_API_KEY
          description: "Hanya untuk Weaviate Cloud"
    usage:
      basic_example: |
        import weaviate
        from weaviate.classes.config import Configure, Property, DataType

        client = weaviate.connect_to_local()  # Connect ke http://localhost:8080

        # Buat collection
        client.collections.create(
            name="Company",
            vectorizer_config=Configure.Vectorizer.none(),  # Manual embedding
            properties=[
                Property(name="company_name", data_type=DataType.TEXT),
                Property(name="industry",     data_type=DataType.TEXT),
                Property(name="domain",       data_type=DataType.TEXT),
            ],
        )

        # Insert dengan manual vector
        collection = client.collections.get("Company")
        collection.data.insert(
            properties={"company_name": "PT Maju", "industry": "logistics", "domain": "maju.co.id"},
            vector=[0.1, 0.2, ...],
        )

        # Hybrid search
        results = collection.query.hybrid(
            query="supply chain technology",
            vector=[0.1, 0.2, ...],
            alpha=0.5,   # 0=pure BM25, 1=pure vector, 0.5=balanced
            limit=5,
        )
        for r in results.objects:
            print(r.properties["company_name"], r.metadata.score)

        client.close()

      retro_example: |
        import weaviate
        from weaviate.classes.config import Configure, Property, DataType
        from sentence_transformers import SentenceTransformer
        import contextlib

        COLLECTION_NAME = "RetroCompany"
        _weaviate_client = None

        @contextlib.contextmanager
        def get_weaviate():
            global _weaviate_client
            if _weaviate_client is None:
                _weaviate_client = weaviate.connect_to_local()
                _ensure_schema(_weaviate_client)
            yield _weaviate_client

        def _ensure_schema(client):
            existing = [c.name for c in client.collections.list_all().values()]
            if COLLECTION_NAME not in existing:
                client.collections.create(
                    name=COLLECTION_NAME,
                    vectorizer_config=Configure.Vectorizer.none(),
                    properties=[
                        Property(name="company_name",    data_type=DataType.TEXT),
                        Property(name="domain",          data_type=DataType.TEXT),
                        Property(name="industry",        data_type=DataType.TEXT),
                        Property(name="expo",            data_type=DataType.TEXT),
                        Property(name="value_prop_text", data_type=DataType.TEXT),
                    ],
                )

        def hybrid_search_weaviate(
            retro_text: str,
            keywords: list[str],
            top_k: int = 20,
            alpha: float = 0.6,  # 60% semantic, 40% BM25
        ) -> list[dict]:
            embedder = SentenceTransformer("all-MiniLM-L6-v2")
            query_vec = embedder.encode(retro_text, normalize_embeddings=True).tolist()

            # Gabung keywords untuk BM25 query
            keyword_query = " ".join(keywords)

            with get_weaviate() as client:
                collection = client.collections.get(COLLECTION_NAME)
                results = collection.query.hybrid(
                    query=keyword_query,
                    vector=query_vec,
                    alpha=alpha,
                    limit=top_k,
                    return_metadata=["score", "explain_score"],
                )

            return [
                {
                    "hybrid_score":  r.metadata.score,
                    "company_name":  r.properties["company_name"],
                    "domain":        r.properties["domain"],
                    "industry":      r.properties["industry"],
                }
                for r in results.objects
            ]

      expected_output: |
        Hybrid search results (alpha=0.6: 60% semantic, 40% keyword):
        [0.8234] PT Sinar Logistik Nusantara | sinarlogistik.co.id | logistics
        [0.7891] Global SCM Tech             | globalscm.io        | technology
        [0.7645] Nexus Distribution Hub      | nexusdist.sg        | logistics

    notes:
      - "alpha=0.5 adalah balanced hybrid, alpha=0.7 lebih condong ke semantic search, alpha=0.3 lebih condong ke keyword"
      - "Weaviate BM25 bekerja pada field TEXT yang di-index, pastikan company_name dan industry adalah DataType.TEXT"
      - "Weaviate v4 (weaviate-client>=4.0.0) memiliki breaking change dari v3, pastikan gunakan v4 API"
      - "Hybrid search Weaviate sangat berguna ketika ada industry-specific terms yang semantic search saja tidak bisa tangkap"
    pitfalls:
      - "Weaviate lebih complex setup dibanding Qdrant, hanya worth it jika memang butuh hybrid search"
      - "JANGAN lupa client.close() setelah selesai, gunakan context manager atau try/finally"
      - "Weaviate Cloud sandbox expired setelah 14 hari, tidak cocok untuk production tanpa upgrade"
