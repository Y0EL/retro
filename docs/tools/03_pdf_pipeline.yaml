  - id: pdfplumber
    name: "pdfplumber"
    category: "PDF Text Extraction"
    description: >
      Library Python untuk ekstrak text dan tabel dari PDF. Sangat baik
      untuk tabel kompleks dengan border, kolom, dan merged cell.
    specific_function: >
      Ekstrak tabel dari PDF dengan presisi tinggi. Deteksi border, kolom,
      merged cell. Output sebagai list of lists yang bisa dikonversi ke
      DataFrame pandas.
    language: "Python"
    pricing: "Gratis & open source"
    last_updated: "2025"
    url: "https://github.com/jsvine/pdfplumber"

    retro:
      phase: "Phase 2 - Secure Data Pipeline"
      role: >
        Specialized table extractor. Digunakan ketika PDF katalog perusahaan
        berisi tabel spesifikasi produk atau daftar harga yang perlu
        diekstrak secara terstruktur. Lebih akurat dari PyMuPDF untuk tabel.
      when_to_use: >
        Gunakan setelah PyMuPDF/pymupdf4llm selesai, jika masih ada tabel
        yang tidak ter-extract dengan baik. Atau gunakan sebagai additional
        pass khusus untuk halaman yang terdeteksi mengandung tabel penting.
      priority: "secondary (specialized table extraction)"
      output_goes_to: "staging/pdf_tables/{domain}/"

    setup:
      install: "pip install pdfplumber"
      requirements:
        - "Python 3.8+"
      env_vars: []

    usage:
      basic_example: |
        import pdfplumber
        import pandas as pd

        with pdfplumber.open("catalog.pdf") as pdf:
            for i, page in enumerate(pdf.pages):
                tables = page.extract_tables()
                for j, table in enumerate(tables):
                    if table:
                        df = pd.DataFrame(table[1:], columns=table[0])
                        print(f"Page {i+1}, Table {j+1}:")
                        print(df.head())
                        print("---")

      retro_example: |
        import pdfplumber
        import pandas as pd
        import json
        from pathlib import Path
        from datetime import datetime

        def retro_extract_pdf_tables(pdf_path: str, company_domain: str) -> dict:
            """
            Ekstrak semua tabel dari PDF.
            Berguna untuk tabel spesifikasi produk, daftar harga, dll.
            """
            tables_found = []
            pdf_path = Path(pdf_path)

            with pdfplumber.open(str(pdf_path)) as pdf:
                for page_num, page in enumerate(pdf.pages):
                    try:
                        tables = page.extract_tables({
                            "vertical_strategy": "lines",
                            "horizontal_strategy": "lines",
                            "snap_tolerance": 3
                        })

                        for table_idx, table in enumerate(tables):
                            if not table or len(table) < 2:
                                continue

                            # Filter baris kosong
                            cleaned = [
                                [str(cell).strip() if cell else "" for cell in row]
                                for row in table
                                if any(cell for cell in row)
                            ]

                            if len(cleaned) < 2:
                                continue

                            # Convert ke dict untuk JSON serializable
                            headers = cleaned[0]
                            rows = cleaned[1:]

                            tables_found.append({
                                "page": page_num + 1,
                                "table_index": table_idx,
                                "headers": headers,
                                "rows": rows,
                                "row_count": len(rows),
                                "col_count": len(headers)
                            })

                    except Exception as e:
                        print(f"[pdfplumber] Error on page {page_num + 1}: {e}")

            result = {
                "company_domain": company_domain,
                "pdf_filename": pdf_path.name,
                "tables_found": len(tables_found),
                "tables": tables_found,
                "extracted_at": datetime.utcnow().isoformat()
            }

            print(f"[pdfplumber] Found {len(tables_found)} tables in {pdf_path.name}")
            output = Path(f"staging/pdf_tables/{company_domain.replace('.', '_')}_{pdf_path.stem}_tables.json")
            output.parent.mkdir(parents=True, exist_ok=True)
            with open(output, "w", encoding="utf-8") as f:
                json.dump(result, f, indent=2, ensure_ascii=False)

            return result

        result = retro_extract_pdf_tables("staging/pdfs/abctech_co_id/catalog.pdf", "abctech.co.id")

      expected_output: |
        [pdfplumber] Found 8 tables in catalog.pdf

        Table example:
        {
          "page": 12,
          "table_index": 0,
          "headers": ["Model", "CPU", "RAM", "Connectivity", "Price"],
          "rows": [
            ["GT-PRO-2024", "ARM Cortex-A53", "2GB", "4G LTE + WiFi 6", "Contact"],
            ["GT-LITE-2024", "ARM Cortex-A35", "512MB", "WiFi 5", "Contact"]
          ],
          "row_count": 2,
          "col_count": 5
        }

    notes:
      - "Strategy 'lines' lebih akurat untuk tabel dengan border. 'text' untuk tabel tanpa border."
      - "snap_tolerance=3 membantu untuk tabel yang alignment-nya sedikit off."
      - "Untuk tabel tanpa border, gunakan strategy 'text' atau coba kedua strategy."
    pitfalls:
      - "Tabel yang sangat kompleks (multi-level header, merged cells) mungkin tidak ter-extract sempurna."
      - "Jangan gunakan pdfplumber untuk scanned PDF. Hasilnya akan kosong."

  - id: tesseract_pytesseract
    name: "Tesseract OCR (pytesseract)"
    category: "OCR (Scanned PDF / Image)"
    description: >
      OCR engine open-source terpopuler dari Google. Support 100+ bahasa.
      Python wrapper via pytesseract. Fallback yang reliable ketika
      Surya tidak tersedia atau terlalu lambat untuk use case sederhana.
    specific_function: >
      OCR gambar dan scanned PDF. Ekstrak text dari foto dokumen.
      Bisa digunakan langsung dari command line atau via Python wrapper.
    language: "Python / C"
    pricing: "Gratis & open source"
    last_updated: "2025"
    url: "https://github.com/tesseract-ocr/tesseract"

    retro:
      phase: "Phase 2 - Secure Data Pipeline"
      role: >
        Fallback OCR engine ketika Surya tidak tersedia. Lebih lambat
        dan kurang akurat dari Surya untuk dokumen campuran Indonesia-Inggris,
        tapi lebih ringan dan tidak butuh GPU sama sekali.
      when_to_use: >
        Gunakan Tesseract hanya jika Surya gagal atau tidak tersedia (misalnya
        di server tanpa GPU dan RAM terbatas). Untuk akurasi terbaik, selalu
        prioritaskan Surya. Tesseract cocok untuk gambar sederhana dengan
        teks satu bahasa yang bersih.
      priority: "fallback (setelah Surya)"
      output_goes_to: "staging/pdf_text/{domain}_ocr.json"

    setup:
      install: |
        # Install Tesseract binary (Ubuntu/Debian):
        sudo apt-get install tesseract-ocr
        sudo apt-get install tesseract-ocr-ind  # Bahasa Indonesia

        # Python wrapper:
        pip install pytesseract Pillow
      requirements:
        - "Tesseract binary installed di sistem"
        - "Language data untuk Indonesia: tesseract-ocr-ind"
      env_vars:
        - name: "TESSDATA_PREFIX"
          description: "Path ke tessdata directory, umumnya /usr/share/tesseract-ocr/5/"

    usage:
      basic_example: |
        import pytesseract
        from PIL import Image
        import fitz  # PyMuPDF untuk convert PDF ke image

        # OCR dari gambar langsung
        image = Image.open("scanned_page.png")
        text = pytesseract.image_to_string(image, lang="eng+ind")  # Inggris + Indonesia
        print(text[:300])

        # OCR dengan confidence data
        data = pytesseract.image_to_data(image, lang="eng+ind", output_type=pytesseract.Output.DICT)
        print(f"Words found: {len([w for w in data['text'] if w.strip()])}")

      retro_example: |
        import pytesseract
        from PIL import Image, ImageEnhance, ImageFilter
        import fitz
        import json
        from pathlib import Path
        from datetime import datetime

        def preprocess_image_for_ocr(image: Image.Image) -> Image.Image:
            """
            Pre-processing gambar untuk meningkatkan akurasi OCR.
            """
            # Convert ke grayscale
            image = image.convert("L")
            # Tingkatkan contrast
            enhancer = ImageEnhance.Contrast(image)
            image = enhancer.enhance(2.0)
            # Sharpen
            image = image.filter(ImageFilter.SHARPEN)
            return image

        def retro_tesseract_ocr(pdf_path: str, company_domain: str) -> dict:
            """
            OCR scanned PDF menggunakan Tesseract.
            Fallback jika Surya tidak tersedia.
            """
            pdf_path = Path(pdf_path)
            doc = fitz.open(str(pdf_path))
            all_text = []

            print(f"[Tesseract] OCR-ing {doc.page_count} pages...")

            for page_num, page in enumerate(doc):
                mat = fitz.Matrix(2.5, 2.5)  # High DPI untuk akurasi
                pix = page.get_pixmap(matrix=mat)
                img = Image.frombytes("RGB", [pix.width, pix.height], pix.samples)
                img = preprocess_image_for_ocr(img)

                # OCR dengan config custom
                custom_config = r"--oem 3 --psm 6"  # oem 3 = LSTM neural net, psm 6 = block of text
                text = pytesseract.image_to_string(img, lang="eng+ind", config=custom_config)

                if text.strip():
                    all_text.append({
                        "page_num": page_num + 1,
                        "text": text.strip(),
                        "word_count": len(text.split())
                    })

            doc.close()
            combined = "\n\n".join(
                f"## Halaman {p['page_num']}\n\n{p['text']}"
                for p in all_text
            )

            print(f"[Tesseract] Done: {len(all_text)} pages with text")
            return {
                "company_domain": company_domain,
                "combined_text": combined,
                "total_words": sum(p["word_count"] for p in all_text),
                "ocr_method": "tesseract",
                "extracted_at": datetime.utcnow().isoformat()
            }

        result = retro_tesseract_ocr("staging/pdfs/company/brochure.pdf", "company.co.id")
        print(f"Words extracted: {result['total_words']}")

      expected_output: |
        [Tesseract] OCR-ing 16 pages...
        [Tesseract] Done: 15 pages with text
        Words extracted: 5847

    notes:
      - "lang='eng+ind' untuk dokumen campuran Inggris-Indonesia."
      - "oem 3 (LSTM) lebih akurat dari oem 1. Gunakan selalu oem 3."
      - "psm 6 untuk block of text standar. psm 4 untuk satu kolom, psm 1 untuk auto."
      - "Pre-processing gambar (grayscale, contrast, sharpen) meningkatkan akurasi 20-40%."
    pitfalls:
      - "Tesseract butuh binary di PATH. Pastikan terinstall di sistem dan tesseract --version berhasil."
      - "Dokumen dengan layout 2-kolom menghasilkan teks yang bercampur. Gunakan psm 2 untuk ini."
      - "Tesseract lebih lambat dari Surya dan akurasinya lebih rendah untuk font non-standar."

  - id: pdf2image
    name: "pdf2image"
    category: "Image Extraction & Metadata"
    description: >
      Konversi halaman PDF ke gambar PIL/Pillow menggunakan poppler backend.
      Utility penting dalam pipeline OCR untuk convert PDF ke format gambar
      sebelum diproses oleh OCR engine.
    specific_function: >
      Render halaman PDF menjadi gambar untuk diproses lebih lanjut atau
      ditampilkan. Output: list of PIL Image objects.
    language: "Python"
    pricing: "Gratis & open source"
    last_updated: "2024"
    url: "https://github.com/Belval/pdf2image"

    retro:
      phase: "Phase 2 - Secure Data Pipeline"
      role: >
        PDF-to-Image converter sebagai alternatif dari PyMuPDF untuk
        konversi. Digunakan dalam pipeline OCR ketika membutuhkan gambar
        berkualitas tinggi dari halaman PDF untuk EasyOCR atau Tesseract.
      when_to_use: >
        Gunakan jika PyMuPDF tidak tersedia atau jika perlu format gambar
        yang lebih kompatibel dengan tools tertentu. Untuk pipeline standar
        RETRO, PyMuPDF sudah cukup untuk konversi PDF ke image.
      priority: "secondary utility"
      output_goes_to: "Temporary images untuk OCR pipeline"

    setup:
      install: |
        # Install poppler (backend):
        # Ubuntu: sudo apt-get install poppler-utils
        # Windows: Download dari https://github.com/oschwartz10612/poppler-windows

        pip install pdf2image Pillow
      requirements:
        - "poppler-utils installed di sistem"
      env_vars: []

    usage:
      basic_example: |
        from pdf2image import convert_from_path
        from pathlib import Path

        # Convert semua halaman ke images
        images = convert_from_path(
            "catalog.pdf",
            dpi=200,          # 200 DPI untuk OCR, 300 untuk kualitas lebih baik
            fmt="jpeg",
            thread_count=4    # Parallel conversion
        )

        print(f"Pages converted: {len(images)}")
        for i, img in enumerate(images):
            img.save(f"output/page_{i+1:03d}.jpg", "JPEG", quality=95)
            print(f"Saved page {i+1}: {img.size}")

      retro_example: |
        from pdf2image import convert_from_path
        from pathlib import Path

        def retro_pdf_to_images(pdf_path: str, dpi: int = 200) -> list:
            """
            Convert PDF ke list images untuk OCR pipeline.
            Return: list of PIL Image objects.
            """
            images = convert_from_path(
                pdf_path,
                dpi=dpi,
                thread_count=2,
                grayscale=True  # Grayscale lebih baik untuk OCR
            )
            print(f"[pdf2image] Converted {len(images)} pages at {dpi} DPI")
            return images

        images = retro_pdf_to_images("scanned.pdf", dpi=200)
        # Langsung pass ke Tesseract atau EasyOCR
        import pytesseract
        for i, img in enumerate(images):
            text = pytesseract.image_to_string(img, lang="eng+ind")
            print(f"Page {i+1}: {len(text)} chars")

      expected_output: |
        [pdf2image] Converted 24 pages at 200 DPI
        Page 1: 1847 chars
        Page 2: 2103 chars
        ...

    notes:
      - "dpi=200 cukup untuk OCR. dpi=300 untuk kualitas arsip tapi file lebih besar."
      - "grayscale=True menghemat memory dan sedikit mempercepat OCR."
      - "thread_count untuk parallel page conversion. Set ke jumlah CPU cores."
    pitfalls:
      - "poppler HARUS terinstall di sistem. Error 'poppler not found' = poppler belum diinstall."
      - "PDF besar dengan banyak halaman bisa menghabiskan RAM jika semua diload sekaligus. Convert per batch."

  - id: pillow_pil
    name: "Pillow (PIL)"
    category: "Image Extraction & Metadata"
    description: >
      Library manipulasi gambar Python standar. Pre-processing untuk OCR.
      Digunakan untuk crop, resize, enhance contrast gambar sebelum OCR.
    specific_function: >
      Crop, resize, enhance contrast gambar sebelum OCR untuk akurasi
      lebih tinggi. Juga untuk extract dan simpan gambar dari halaman PDF.
    language: "Python"
    pricing: "Gratis & open source"
    last_updated: "2025"
    url: "https://github.com/python-pillow/Pillow"

    retro:
      phase: "Phase 2 - Secure Data Pipeline"
      role: >
        Image preprocessing utility. Digunakan sebelum OCR untuk
        meningkatkan kualitas gambar yang akan di-OCR, sehingga
        akurasi OCR lebih tinggi.
      when_to_use: >
        Selalu gunakan untuk pre-processing gambar sebelum Tesseract.
        Untuk Surya, pre-processing biasanya tidak diperlukan karena
        model neural network lebih robust terhadap kualitas gambar.
      priority: "primary utility dalam OCR pipeline"
      output_goes_to: "Temporary processed images untuk OCR"

    setup:
      install: "pip install Pillow"
      requirements:
        - "Python 3.8+"
      env_vars: []

    usage:
      basic_example: |
        from PIL import Image, ImageEnhance, ImageFilter

        img = Image.open("scanned_page.jpg")

        # Pre-processing untuk OCR
        img = img.convert("L")                      # Grayscale
        img = ImageEnhance.Contrast(img).enhance(2) # Tingkatkan contrast
        img = ImageEnhance.Sharpness(img).enhance(2)# Sharpen
        img = img.filter(ImageFilter.SHARPEN)       # Extra sharpen

        img.save("processed_page.jpg")
        print(f"Processed: {img.size}, mode: {img.mode}")

      retro_example: |
        from PIL import Image, ImageEnhance, ImageFilter
        import numpy as np

        def retro_preprocess_for_ocr(image: Image.Image, target_dpi: int = 200) -> Image.Image:
            """
            Standard pre-processing pipeline untuk gambar sebelum OCR.
            Meningkatkan akurasi Tesseract secara signifikan.
            """
            # Convert ke grayscale
            if image.mode != "L":
                image = image.convert("L")

            # Resize jika DPI terlalu rendah
            w, h = image.size
            if min(w, h) < 1000:  # Image terlalu kecil
                scale = 1000 / min(w, h)
                image = image.resize(
                    (int(w * scale), int(h * scale)),
                    Image.LANCZOS
                )

            # Tingkatkan contrast
            image = ImageEnhance.Contrast(image).enhance(1.8)
            # Tingkatkan brightness sedikit
            image = ImageEnhance.Brightness(image).enhance(1.1)
            # Sharpen
            image = image.filter(ImageFilter.SHARPEN)

            return image

        # Penggunaan dalam pipeline OCR
        raw_image = Image.open("raw_scan.jpg")
        processed = retro_preprocess_for_ocr(raw_image)
        import pytesseract
        text = pytesseract.image_to_string(processed, lang="eng+ind")
        print(f"OCR result ({len(text.split())} words):\n{text[:200]}")

      expected_output: |
        OCR result (847 words):
        ABC Technology
        Product Catalog 2024

        IoT Gateway Pro
        Model: GT-PRO-2024
        ...

    notes:
      - "Grayscale conversion selalu dilakukan pertama sebelum enhancement lain."
      - "Contrast enhancement 1.5-2.0 adalah range yang baik. Lebih dari 2.5 bisa merusak teks."
      - "LANCZOS adalah resampling filter terbaik untuk upscaling."
    pitfalls:
      - "Terlalu banyak pre-processing bisa merusak teks yang tipis. Test dengan beberapa sample dulu."
      - "Gambar yang terlalu gelap perlu brightness enhancement sebelum contrast."
