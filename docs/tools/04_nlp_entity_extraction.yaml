        from datetime import datetime
        import json

        def retro_validate_emails(emails: list, check_mx: bool = True) -> list:
            """
            Validasi list email untuk pipeline RETRO.
            Return: list email yang valid dengan metadata validasi.
            """
            validated = []

            for email in emails:
                if not email or "@" not in email:
                    continue

                result = {
                    "email": email.lower().strip(),
                    "is_valid": False,
                    "normalized": None,
                    "domain": None,
                    "mx_valid": None,
                    "error": None,
                    "validated_at": datetime.utcnow().isoformat()
                }

                try:
                    valid = validate_email(
                        email,
                        check_deliverability=check_mx  # Cek MX record
                    )
                    result["is_valid"] = True
                    result["normalized"] = valid.normalized
                    result["domain"] = valid.domain
                    result["mx_valid"] = check_mx  # Jika sampai sini, MX valid
                except EmailNotValidError as e:
                    result["error"] = str(e)

                validated.append(result)

            valid_count = sum(1 for e in validated if e["is_valid"])
            print(f"[EmailValidator] {valid_count}/{len(validated)} emails valid")
            return validated

        # Contoh penggunaan
        found_emails = [
            "info@abctech.co.id",
            "sales@abctech.co.id",
            "invalid-email",
            "user@fakeDomain123456.xyz"
        ]

        results = retro_validate_emails(found_emails, check_mx=True)
        for r in results:
            status = "VALID" if r["is_valid"] else f"INVALID ({r['error'][:30]}...)"
            print(f"{r['email']}: {status}")

      expected_output: |
        [EmailValidator] 2/4 emails valid
        info@abctech.co.id: VALID
        sales@abctech.co.id: VALID
        invalid-email: INVALID (The email address is not valid...)
        user@fakeDomain123456.xyz: INVALID (The domain name fakeDomain...)

    notes:
      - "check_deliverability=True melakukan DNS lookup untuk MX record. Butuh koneksi internet."
      - "valid.normalized mengembalikan email dalam format lowercase yang ternormalisasi."
      - "Untuk batch processing, set check_deliverability=False untuk kecepatan, lalu re-check yang akan digunakan."
    pitfalls:
      - "MX check bisa lambat (1-3 detik per email). Gunakan async atau limit ke email prioritas."
      - "Beberapa domain valid tidak punya MX record yang bisa dideteksi. Jangan langsung dismiss."
